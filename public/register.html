<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - T35 Academy</title>
    <link rel="stylesheet" href="assets/css/design-system.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
            font-family: var(--font-family);
            padding: 1rem;
            overflow-x: hidden;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            padding: 2rem;
            background: var(--bg2);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }

        .register-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .register-header img {
            height: 50px;
            margin-bottom: 0.75rem;
        }

        .register-header h1 {
            color: var(--text);
            font-size: 22px;
            margin: 0 0 0.25rem 0;
        }

        .register-header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .btn-register {
            width: 100%;
            padding: 0.65rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .btn-register:hover {
            background: #f08a00;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .error-message {
            padding: 0.65rem 0.9rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .success-message {
            padding: 0.65rem 0.9rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            color: #22c55e;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .login-link a {
            color: var(--amber);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Scrollbar customizado */
        .register-container::-webkit-scrollbar {
            width: 6px;
        }

        .register-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .register-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .register-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 1.25rem;
                max-height: 95vh;
            }

            .register-header h1 {
                font-size: 18px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .form-group {
                margin-bottom: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <img src="assets/img/t35logo.png" alt="T35 Academy">
            <h1>T35 Academy</h1>
            <p>Crie sua conta</p>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="fullName">Nome Completo *</label>
                <input type="text" id="fullName" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha *</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha *</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
                </div>

                <div class="form-group">
                    <label for="phone">Telefone *</label>
                    <input type="text" id="phone" placeholder="(00) 00000-0000" maxlength="15" required>
                </div>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" placeholder="Sua matrícula (opcional)">
            </div>

            <div class="form-group">
                <label for="empresa">Empresa *</label>
                <select id="empresa" required>
                    <option value="">Carregando empresas...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="localAtuacao">Local de Atuação *</label>
                <input type="text" id="localAtuacao" placeholder="Cidade/Estado" required>
            </div>

            <button type="submit" class="btn-register" id="btnRegister">Criar Conta</button>
        </form>

        <div class="login-link">
            Já tem conta? <a href="login.html">Faça login aqui</a>
        </div>
    </div>

    <!-- ✅ Script com módulos -->
    <script type="module">
        import { handleRegister } from './assets/js/auth.js';
        import { formatCPF, formatPhone, validateCPF, removePhoneFormat, removeCPFFormat } from './assets/js/utils.js';
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        const registerForm = document.getElementById('registerForm');
        const cpfInput = document.getElementById('cpf');
        const phoneInput = document.getElementById('phone');
        const empresaSelect = document.getElementById('empresa');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const btnRegister = document.getElementById('btnRegister');

        // ✅ Carrega empresas ao iniciar a página
        loadEmpresas();

        // ✅ Máscara automática para CPF
        cpfInput.addEventListener('input', (e) => {
            e.target.value = formatCPF(e.target.value);
        });

        // ✅ Máscara automática para Telefone
        phoneInput.addEventListener('input', (e) => {
            e.target.value = formatPhone(e.target.value);
        });

        // ✅ Carrega lista de empresas do Firestore
        async function loadEmpresas() {
            try {
                let querySnapshot;
                try {
                    // Tenta com orderBy (requer índice no Firestore)
                    const q = query(collection(db, 'empresas'), orderBy('nome', 'asc'));
                    querySnapshot = await getDocs(q);
                } catch (indexError) {
                    // Fallback sem ordenação caso o índice não exista
                    console.warn('Índice não encontrado, carregando sem ordenação:', indexError.message);
                    querySnapshot = await getDocs(collection(db, 'empresas'));
                }

                empresaSelect.innerHTML = '<option value="">Selecione uma empresa</option>';

                if (querySnapshot.empty) {
                    empresaSelect.innerHTML = '<option value="">Nenhuma empresa cadastrada</option>';
                    return;
                }

                const opcoes = [];
                querySnapshot.forEach((doc) => {
                    const empresa = doc.data();
                    if (empresa.nome) opcoes.push(empresa.nome);
                });

                // Ordena no cliente caso o fallback tenha sido usado
                opcoes.sort((a, b) => a.localeCompare(b, 'pt-BR'));

                opcoes.forEach((nome) => {
                    const option = document.createElement('option');
                    option.value = nome;
                    option.textContent = nome;
                    empresaSelect.appendChild(option);
                });

            } catch (error) {
                console.error('Erro ao carregar empresas:', error.code, error.message);

                if (error.code === 'permission-denied') {
                    empresaSelect.innerHTML = '<option value="">Sem permissão para carregar empresas</option>';
                    showError('Erro de permissão ao carregar empresas. Contate o administrador.');
                } else {
                    empresaSelect.innerHTML = '<option value="">Erro ao carregar empresas</option>';
                    showError('Não foi possível carregar a lista de empresas. Tente recarregar a página.');
                }
            }
        }

        // ✅ Validação e envio do formulário
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const cpf = document.getElementById('cpf').value;
            const phone = document.getElementById('phone').value;
            const matricula = document.getElementById('matricula').value.trim();
            const empresa = document.getElementById('empresa').value;
            const localAtuacao = document.getElementById('localAtuacao').value.trim();

            // Limpar mensagens
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // ✅ Validações
            if (!fullName) {
                showError('Digite seu nome completo');
                return;
            }

            if (password !== confirmPassword) {
                showError('As senhas não coincidem');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter no mínimo 6 caracteres');
                return;
            }

            if (!validateCPF(cpf)) {
                showError('CPF inválido');
                return;
            }

            const cleanPhone = removePhoneFormat(phone);
            if (cleanPhone.length !== 11) {
                showError('Telefone inválido (deve ter 11 dígitos)');
                return;
            }

            if (!empresa) {
                showError('Selecione uma empresa');
                return;
            }

            if (!localAtuacao) {
                showError('Digite o local de atuação');
                return;
            }

            btnRegister.classList.add('loading');
            btnRegister.textContent = 'Criando conta...';

            try {
                await handleRegister({
                    fullName,
                    email,
                    password,
                    cpf: removeCPFFormat(cpf),
                    phone: cleanPhone,
                    matricula: matricula || null,
                    empresa,
                    localAtuacao
                });

                showSuccess('Conta criada com sucesso! Redirecionando...');

                // Redireciona após 2 segundos
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (error) {
                console.error('Erro no cadastro:', error);
                showError(error.message || 'Erro ao criar conta');
                btnRegister.classList.remove('loading');
                btnRegister.textContent = 'Criar Conta';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }
    </script>
</body>
</html>
