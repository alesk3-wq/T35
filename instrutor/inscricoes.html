<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 { color: var(--text); font-size: 26px; margin: 0; }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filters input,
        .filters select {
            padding: 0.65rem 1rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            min-width: 180px;
        }
        .filters input { flex: 1; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            text-align: center;
        }
        .summary-card .s-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .summary-card .s-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .s-pendente  { color: var(--amber) !important; }
        .s-apto, .s-aprovada  { color: #22c55e !important; }
        .s-concluido { color: #3b82f6 !important; }
        .s-rejeitada { color: #ef4444 !important; }
        .s-falta     { color: #a855f7 !important; }

        .table-container {
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        thead { background: var(--bg); border-bottom: 2px solid var(--border); }
        th {
            padding: 0.9rem 1rem;
            text-align: left;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(245,158,11,0.04); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .status-pendente  { background: rgba(245,158,11,0.12); color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
        .status-apto, .status-aprovada  { background: rgba(34,197,94,0.12);  color: #22c55e;       border: 1px solid rgba(34,197,94,0.3); }
        .status-concluido { background: rgba(59,130,246,0.12); color: #3b82f6;       border: 1px solid rgba(59,130,246,0.3); }
        .status-rejeitada { background: rgba(239,68,68,0.12);  color: #ef4444;       border: 1px solid rgba(239,68,68,0.3); }
        .status-falta     { background: rgba(168,85,247,0.12); color: #a855f7;       border: 1px solid rgba(168,85,247,0.3); }

        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-action {
            padding: 0.35rem 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-aprovar  { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .btn-aprovar:hover  { background: rgba(34,197,94,0.3); }
        .btn-rejeitar { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .btn-rejeitar:hover { background: rgba(239,68,68,0.3); }
        .btn-concluir { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .btn-concluir:hover { background: rgba(59,130,246,0.3); }
        .btn-reativar { background: rgba(245,158,11,0.15); color: var(--amber); }
        .btn-reativar:hover { background: rgba(245,158,11,0.3); }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: none;
        }
        .alert-success { background: rgba(34,197,94,0.12); color: #22c55e;  border: 1px solid rgba(34,197,94,0.3); }
        .alert-error   { background: rgba(239,68,68,0.12); color: #ef4444;  border: 1px solid rgba(239,68,68,0.3); }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .filters { flex-direction: column; }
            .filters input, .filters select { min-width: auto; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Modal confirmação falta ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
        }
        .modal-box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.1rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-box-header h2 { margin: 0; font-size: 17px; color: #ef4444; }
        .modal-box-body { padding: 1.25rem 1.5rem; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
        .modal-box-body strong { color: var(--text); }
        .modal-box-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
        }
        .btn-modal-cancel {
            padding: 0.6rem 1.2rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-modal-falta {
            padding: 0.6rem 1.2rem;
            background: #ef4444;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-modal-falta:hover { background: #dc2626; }
    </style>
</head>
<body>

    <main class="main">

                <h1>Inscrições nos Meus Cursos</h1>
            </div>

            <div id="alertSuccess" class="alert alert-success"></div>
            <div id="alertError"   class="alert alert-error"></div>

            <div class="summary-grid">
                <div class="summary-card">
                    <div class="s-value" id="cntTotal">—</div>
                    <div class="s-label">Total</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-pendente" id="cntPendente">—</div>
                    <div class="s-label">Pendentes</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-apto" id="cntApto">—</div>
                    <div class="s-label">Aptos</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-concluido" id="cntConcluido">—</div>
                    <div class="s-label">Concluídas</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-rejeitada" id="cntRejeitada">—</div>
                    <div class="s-label">Rejeitadas</div>
                </div>

                    <div class="s-value s-falta" id="cntFalta">—</div>

                </div>

                <input type="text" id="searchInput" placeholder="Buscar por aluno...">

                    <option value="apto">Aptos</option>
                    <option value="concluido">Concluídas</option>
                    <option value="rejeitada">Rejeitadas</option>

                <select id="cursoFilter">
                    <option value="">Todos os meus cursos</option>
                </select>

            <div class="table-container">

                    <thead>
                        <tr>
                            <th>Candidato</th>
                            <th>Empresa</th>
                            <th>Curso</th>
                            <th>Data Inscrição</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="inscricoesList">

    <!-- Modal: confirmar falta -->
    <div class="modal-overlay" id="modalConfirmarFalta">
        <div class="modal-box">
            <div class="modal-box-header">
                <h2>⚠ Registrar Falta</h2>
            </div>
            <div class="modal-box-body" id="textoModalFalta"></div>
            <div class="modal-box-footer">
                <button class="btn-modal-cancel" id="btnCancelarFalta">Cancelar</button>
                <button class="btn-modal-falta"  id="btnConfirmarFalta">Confirmar Falta</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, getDoc, doc, updateDoc,
            query, where, orderBy, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);
        document.getElementById('searchInput').addEventListener('input', renderTabela);
        document.getElementById('statusFilter').addEventListener('change', renderTabela);
        document.getElementById('cursoFilter').addEventListener('change', renderTabela);
        document.getElementById('btnCancelarFalta').addEventListener('click', fecharModalFalta);
        document.getElementById('btnConfirmarFalta').addEventListener('click', confirmarFalta);
        document.getElementById('modalConfirmarFalta').addEventListener('click', e => {
            if (e.target === e.currentTarget) fecharModalFalta();
        });

        let todasInscricoes = [];
        let pendingFaltaId = null;

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }

            const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
            const userData = snap.docs[0]?.data();

            if (!userData || userData.role !== 'instrutor') {
                window.location.href = '../login.html';
                return;
            }

            carregarDados(userData.fullName, userData.email);
        });

        async function carregarDados(nomeInstrutor, emailInstrutor) {
            try {
                // Busca todos os cursos e filtra pelos do instrutor
                const cursosSnap = await getDocs(collection(db, 'cursos'));
                const meusCursos = cursosSnap.docs
                    .filter(d => {
                        const c = d.data();
                        return c.instrutor === nomeInstrutor || c.instrutorEmail === emailInstrutor;
                    })
                    .map(d => ({ id: d.id, ...d.data() }));

                if (meusCursos.length === 0) {
                    document.getElementById('inscricoesList').innerHTML =
                        `<tr><td colspan="6"><div class="empty-state">Nenhum curso vinculado ao seu nome ainda.</div></td></tr>`;
                    ['cntTotal','cntPendente','cntApto','cntConcluido','cntRejeitada'].forEach(id =>
                        document.getElementById(id).textContent = '0'
                    );
                    return;
                }

                // Popula select de cursos
                const cursoSelect = document.getElementById('cursoFilter');
                const cursosMap = {};
                meusCursos.forEach(c => {
                    cursosMap[c.id] = c;
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.titulo;
                    cursoSelect.appendChild(opt);
                });

                // Busca inscrições apenas dos meus cursos (máx 30 por query Firebase)
                const cursoIds = meusCursos.map(c => c.id);
                const inscSnap = await getDocs(query(
                    collection(db, 'inscricoes'),
                    where('cursoId', 'in', cursoIds)
                ));

                // Busca todos os users e monta mapa uid → dados
                const usersSnap = await getDocs(collection(db, 'users'));
                const usersMap = {};
                usersSnap.forEach(d => { usersMap[d.data().uid] = d.data(); });

                todasInscricoes = inscSnap.docs.map(d => ({
                    id: d.id,
                    ...d.data(),
                    _candidato: usersMap[d.data().candidatoId] ?? null,
                    _curso:     cursosMap[d.data().cursoId]     ?? null
                }));

                // Ordena: pendentes primeiro
                const ordem = { pendente: 0, apto: 1, aprovada: 1, concluido: 2, rejeitada: 3 };
                todasInscricoes.sort((a, b) => (ordem[a.status] ?? 9) - (ordem[b.status] ?? 9));

                atualizarResumo();
                renderTabela();
                await processarEnceramentosEad();
            } catch (err) {
                showAlert('Erro ao carregar dados: ' + err.message, 'error');
                console.error(err);
            }
        }

        function atualizarResumo() {
            const cnt = { pendente: 0, apto: 0, aprovada: 0, concluido: 0, rejeitada: 0, falta: 0 };
            todasInscricoes.forEach(i => { if (cnt[i.status] !== undefined) cnt[i.status]++; });
            document.getElementById('cntTotal').textContent     = todasInscricoes.length;
            document.getElementById('cntPendente').textContent  = cnt.pendente;
            document.getElementById('cntApto').textContent  = cnt.apto;
            document.getElementById('cntConcluido').textContent = cnt.concluido;
            document.getElementById('cntRejeitada').textContent = cnt.rejeitada;
            document.getElementById('cntFalta').textContent     = cnt.falta;
        }

        function renderTabela() {
            const busca        = document.getElementById('searchInput').value.toLowerCase();
            const statusFiltro = document.getElementById('statusFilter').value;
            const cursoFiltro  = document.getElementById('cursoFilter').value;

            const filtradas = todasInscricoes.filter(i => {
                const nome    = i._candidato?.fullName?.toLowerCase() ?? '';
                const empresa = i._candidato?.empresa?.toLowerCase()  ?? '';
                const buscaOk  = !busca        || nome.includes(busca) || empresa.includes(busca);
                const statusOk = !statusFiltro || i.status === statusFiltro;
                const cursoOk  = !cursoFiltro  || i.cursoId === cursoFiltro;
                return buscaOk && statusOk && cursoOk;
            });

            const tbody = document.getElementById('inscricoesList');

            if (filtradas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-secondary);padding:2rem">Nenhuma inscrição encontrada</td></tr>';
                return;
            }

            tbody.innerHTML = filtradas.map(i => {
                const data = i.createdAt?.toDate
                    ? i.createdAt.toDate().toLocaleDateString('pt-BR')
                    : '—';
                return `
                    <tr>
                        <td>
                            <strong>${i._candidato?.fullName ?? '—'}</strong>
                            <div style="font-size:11px;color:var(--text-secondary)">${i._candidato?.email ?? ''}</div>
                        </td>
                        <td>${i._candidato?.empresa ?? '—'}</td>
                        <td>${i._curso?.titulo ?? '—'}</td>
                        <td style="white-space:nowrap">${data}</td>
                        <td><span class="status-badge status-${i.status}">${labelStatus(i.status)}</span></td>
                        <td><div class="actions">${botoesAcao(i)}</div></td>
                    </tr>`;
            }).join('');

            tbody.querySelectorAll('[data-acao]').forEach(btn =>
                btn.addEventListener('click', () => alterarStatus(btn.dataset.id, btn.dataset.acao))
            );
        }

        function botoesAcao(i) {
            if (i.status === 'pendente') return `
                <button class="btn-action btn-aprovar"  data-id="${i.id}" data-acao="apto">Aprovar</button>
                <button class="btn-action btn-rejeitar" data-id="${i.id}" data-acao="rejeitada">Rejeitar</button>`;
            if (i.status === 'apto') {
                const isEad = (i._curso?.modalidade || 'presencial') === 'ead';
                if (isEad) {
                    const df = getDataFimStr(i._curso);
                    const info = df ? `encerra ${formatarDataStr(df)}` : 'automático';
                    return `<span style="color:var(--text-secondary);font-size:12px">🎬 EAD · ${info}</span>`;
                }
                return `
                <button class="btn-action btn-concluir" data-id="${i.id}" data-acao="concluido">Concluir</button>
                <button class="btn-action btn-rejeitar" data-id="${i.id}" data-acao="rejeitada">Cancelar</button>`;
            }
            if (i.status === 'rejeitada') return `
                <button class="btn-action btn-reativar" data-id="${i.id}" data-acao="pendente">Reativar</button>`;
            if (i.status === 'falta') return `
                <button class="btn-action btn-reativar" data-id="${i.id}" data-acao="apto">Reativar</button>`;
            return '<span style="color:var(--text-secondary);font-size:12px">—</span>';
        }

        function getDataFimStr(curso) {
            if (!curso?.dataFim) return null;
            if (typeof curso.dataFim === 'string') return curso.dataFim;
            if (curso.dataFim?.toDate) return curso.dataFim.toDate().toISOString().split('T')[0];
            return null;
        }

        function formatarDataStr(iso) {
            if (!iso) return '—';
            const [y, m, d] = iso.split('-');
            return `${d}/${m}/${y}`;
        }

        function labelStatus(s) {
            return { pendente: 'Pendente', apto: 'Apto',
                aprovada: 'Apto', concluido: 'Concluída', rejeitada: 'Rejeitada', falta: 'Falta' }[s] ?? s;
        }

        async function alterarStatus(inscricaoId, novoStatus) {
            if (novoStatus === 'concluido') {
                const insc = todasInscricoes.find(i => i.id === inscricaoId);
                const isEad = (insc?._curso?.modalidade || 'presencial') === 'ead';

                // EAD nunca pode ser concluído manualmente
                if (isEad) {
                    showAlert('Cursos EAD são encerrados automaticamente ao atingir a data fim.', 'error');
                    return;
                }

                // Presencial/Online: verifica presença fresca do Firestore
                const inscDoc = await getDoc(doc(db, 'inscricoes', inscricaoId));
                const presencas = inscDoc.data()?.presencas ?? [];
                const temPresenca = presencas.length > 0;

                if (temPresenca) {
                    await executarAlterarStatus(inscricaoId, 'concluido');
                } else {
                    const nome = insc?._candidato?.fullName ?? 'este candidato';
                    abrirModalFalta(inscricaoId, nome);
                }
                return;
            }

            await executarAlterarStatus(inscricaoId, novoStatus);
        }

        function abrirModalFalta(inscricaoId, nomeCandidato) {
            pendingFaltaId = inscricaoId;
            document.getElementById('textoModalFalta').innerHTML =
                `<strong>${nomeCandidato}</strong> não confirmou presença neste curso.<br><br>Deseja registrar <strong style="color:#ef4444">Falta</strong>?`;
            document.getElementById('modalConfirmarFalta').classList.add('active');
        }

        function fecharModalFalta() {
            pendingFaltaId = null;
            document.getElementById('modalConfirmarFalta').classList.remove('active');
        }

        async function confirmarFalta() {
            if (!pendingFaltaId) return;
            const id = pendingFaltaId;
            fecharModalFalta();
            await executarAlterarStatus(id, 'falta');
        }

        async function executarAlterarStatus(inscricaoId, statusFinal) {
            try {
                await updateDoc(doc(db, 'inscricoes', inscricaoId), {
                    status: statusFinal,
                    updatedAt: serverTimestamp()
                });

                const insc = todasInscricoes.find(i => i.id === inscricaoId);
                if (insc) insc.status = statusFinal;

                atualizarResumo();
                renderTabela();

                const msgs = {
                    apto:      '✓ Inscrição aprovada!',
                    rejeitada: 'Inscrição rejeitada.',
                    concluido: '✓ Inscrição concluída com presença confirmada.',
                    falta:     'Falta registrada.',
                    pendente:  'Inscrição reativada.'
                };
                showAlert(msgs[statusFinal] ?? 'Status atualizado.', statusFinal === 'falta' ? 'error' : 'success');
            } catch (err) {
                showAlert('Erro ao atualizar: ' + err.message, 'error');
                console.error(err);
            }
        }

        async function processarEnceramentosEad() {
            const hoje = new Date().toISOString().split('T')[0];
            const pendentes = todasInscricoes.filter(i => {
                const isEad = (i._curso?.modalidade || 'presencial') === 'ead';
                const dataFim = getDataFimStr(i._curso);
                return isEad && i.status === 'apto' && dataFim && dataFim < hoje;
            });
            if (pendentes.length === 0) return;

            let processadas = 0;
            for (const i of pendentes) {
                try {
                    const snap = await getDoc(doc(db, 'inscricoes', i.id));
                    const presencas = snap.data()?.presencas ?? [];
                    const statusFinal = presencas.length > 0 ? 'concluido' : 'falta';
                    await updateDoc(doc(db, 'inscricoes', i.id), { status: statusFinal, updatedAt: serverTimestamp() });
                    i.status = statusFinal;
                    processadas++;
                } catch (err) {
                    console.error('Erro ao processar EAD:', i.id, err);
                }
            }

            if (processadas > 0) {
                atualizarResumo();
                renderTabela();
                showAlert(`${processadas} inscrição(ões) EAD encerrada(s) automaticamente.`, 'success');
            }
        }

        function showAlert(msg, type) {
            const el = document.getElementById(type === 'success' ? 'alertSuccess' : 'alertError');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
