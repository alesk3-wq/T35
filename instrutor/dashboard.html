<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--amber);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: rgba(245, 158, 11, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--amber);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .section { margin-bottom: 2rem; }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            margin: 0 0 1rem 0;
        }

        .cursos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        .curso-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .curso-card:hover {
            border-color: var(--amber);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .curso-card-header {
            padding: 1.25rem;
            background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
            border-bottom: 1px solid var(--border);
        }

        .curso-titulo {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.35rem 0;
        }

        .curso-formato {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(59,130,246,0.15);
            color: #3b82f6;
        }

        .curso-card-body { padding: 1.25rem; }

        .curso-info-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
        }

        .curso-info-row svg { flex-shrink: 0; }

        .curso-card-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .btn-presenca {
            padding: 0.5rem 1rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .btn-presenca:hover { background: var(--amber-dark); }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
            background: var(--bg2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            opacity: 0.4;
            margin-bottom: 1rem;
        }

        .greeting {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.25rem 0;
        }

        .greeting-sub {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0 0 2rem 0;
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .cursos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="presenca.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
                <span>Presença</span>
            </a>
            <a href="inscricoes.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                    <rect x="9" y="3" width="6" height="4" rx="1"></rect>
                    <line x1="9" y1="12" x2="15" y2="12"></line>
                    <line x1="9" y1="16" x2="13" y2="16"></line>
                </svg>
                <span>Inscrições</span>
            </a>
            <a href="relatorios.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                <span>Relatórios</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Dashboard</h1>
    </div>

    <main class="main">
        <div class="content">
            <p class="greeting" id="greeting">Olá, Instrutor!</p>
            <p class="greeting-sub">Aqui está o resumo dos seus cursos</p>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-label">Cursos Ativos</div>
                        <div class="stat-value" id="totalAtivos">—</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-label">Total de Alunos</div>
                        <div class="stat-value" id="totalAlunos">—</div>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </div>
                    <div>
                        <div class="stat-label">Cursos Concluídos</div>
                        <div class="stat-value" id="totalConcluidos">—</div>
                    </div>
                </div>
            </div>

            <div class="section">
                <h2 class="section-title">Meus Cursos</h2>
                <div class="cursos-grid" id="cursosGrid">
                    <p style="color: var(--text-secondary); font-size: 14px;">Carregando...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, where, orderBy
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        let userData = null;

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }

            const q = query(collection(db, 'users'), where('uid', '==', user.uid));
            const snap = await getDocs(q);
            userData = snap.docs[0]?.data();

            if (!userData || userData.role !== 'instrutor') {
                alert('Acesso negado!');
                window.location.href = '../login.html';
                return;
            }

            const nome = userData.fullName?.split(' ')[0] || 'Instrutor';
            document.getElementById('greeting').textContent = `Olá, ${nome}!`;

            loadCursos(userData.fullName, userData.email);
        });

        async function loadCursos(nomeInstrutor, emailInstrutor) {
            try {
                const snap = await getDocs(query(collection(db, 'cursos'), orderBy('dataInicio', 'asc')));

                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);

                const meusCursos = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(c =>
                        c.instrutor === nomeInstrutor ||
                        c.instrutorEmail === emailInstrutor
                    );

                let ativos = 0, concluidos = 0, totalAlunos = 0;

                const inscSnap = await getDocs(collection(db, 'inscricoes'));
                const inscPorCurso = {};
                inscSnap.forEach(d => {
                    const cId = d.data().cursoId;
                    inscPorCurso[cId] = (inscPorCurso[cId] || 0) + 1;
                });

                const container = document.getElementById('cursosGrid');

                if (meusCursos.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                            </svg>
                            <p>Nenhum curso vinculado ao seu nome</p>
                            <p style="font-size:12px;margin-top:0.5rem">Peça ao administrador para cadastrar cursos com o nome: <strong>${nomeInstrutor}</strong></p>
                        </div>
                    `;
                    document.getElementById('totalAtivos').textContent = 0;
                    document.getElementById('totalConcluidos').textContent = 0;
                    document.getElementById('totalAlunos').textContent = 0;
                    return;
                }

                meusCursos.forEach(c => {
                    const fim = c.dataFim?.toDate ? c.dataFim.toDate() : new Date(c.dataFim);
                    if (fim >= hoje) ativos++;
                    else concluidos++;
                    totalAlunos += inscPorCurso[c.id] || 0;
                });

                document.getElementById('totalAtivos').textContent = ativos;
                document.getElementById('totalConcluidos').textContent = concluidos;
                document.getElementById('totalAlunos').textContent = totalAlunos;

                container.innerHTML = meusCursos.map(c => {
                    const inicio = c.dataInicio?.toDate ? c.dataInicio.toDate() : new Date(c.dataInicio);
                    const fim = c.dataFim?.toDate ? c.dataFim.toDate() : new Date(c.dataFim);
                    const ativo = fim >= hoje;
                    const alunos = inscPorCurso[c.id] || 0;

                    return `
                        <div class="curso-card">
                            <div class="curso-card-header">
                                <h3 class="curso-titulo">${c.titulo}</h3>
                                <span class="curso-formato">${c.formato}</span>
                            </div>
                            <div class="curso-card-body">
                                <div class="curso-info-row">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                    ${inicio.toLocaleDateString('pt-BR')} → ${fim.toLocaleDateString('pt-BR')}
                                </div>
                                <div class="curso-info-row">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                        <circle cx="9" cy="7" r="4"></circle>
                                    </svg>
                                    ${alunos} aluno(s) inscrito(s)
                                </div>
                                ${c.local ? `<div class="curso-info-row">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                        <circle cx="12" cy="10" r="3"></circle>
                                    </svg>
                                    ${c.local}
                                </div>` : ''}
                            </div>
                            ${ativo ? `<div class="curso-card-footer">
                                <a href="presenca.html" class="btn-presenca">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="9 11 12 14 22 4"></polyline>
                                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                                    </svg>
                                    Marcar Presença
                                </a>
                            </div>` : ''}
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Erro ao carregar cursos:', err);
                document.getElementById('cursosGrid').innerHTML = '<p style="color:var(--text-secondary)">Erro ao carregar cursos</p>';
            }
        }
    </script>
</body>
</html>
