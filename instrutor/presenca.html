<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presença - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .presenca-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .presenca-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .presenca-card h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin: 0 0 1.25rem 0;
        }

        /* ── Seleção de cursos ── */
        .turmas-list { display: flex; flex-direction: column; gap: 0.6rem; }

        .turma-item {
            padding: 0.9rem 1rem;
            border-radius: 8px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg);
        }
        .turma-item:hover { border-color: var(--amber); background: rgba(245,158,11,0.05); }
        .turma-item.selected { border-color: var(--amber); background: rgba(245,158,11,0.08); }
        .turma-nome { font-weight: 600; color: var(--text); font-size: 13px; margin-bottom: 0.2rem; }
        .turma-info { font-size: 11px; color: var(--text-secondary); }

        /* ── Painel do código ── */
        .codigo-panel { display: none; }
        .codigo-panel.visible { display: block; }

        .curso-selecionado-label {
            background: var(--bg);
            border-left: 4px solid var(--amber);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
        }
        .curso-selecionado-label span {
            display: block;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 0.2rem;
        }
        .curso-selecionado-label strong {
            font-size: 15px;
            color: var(--text);
        }

        .codigo-box {
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
            transition: border-color 0.3s ease;
        }
        .codigo-box.tem-codigo { border-color: var(--amber); border-style: solid; }
        .codigo-valor {
            font-size: 44px;
            font-family: 'Courier New', monospace;
            font-weight: 800;
            letter-spacing: 0.25em;
            color: var(--amber);
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .codigo-placeholder {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }
        .codigo-hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .codigo-actions {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .btn-gerar {
            flex: 1;
            padding: 0.75rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-gerar:hover { background: var(--amber-dark); }
        .btn-copiar {
            padding: 0.75rem 1rem;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            display: none;
            white-space: nowrap;
        }
        .btn-copiar.visible { display: block; }
        .btn-copiar:hover { border-color: var(--amber); color: var(--amber); }

        /* ── Lista de alunos ── */
        .alunos-section {
            border-top: 1px solid var(--border);
            padding-top: 1.25rem;
        }
        .alunos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .alunos-header h3 {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0;
        }
        .alunos-count {
            font-size: 13px;
            font-weight: 700;
            color: #22c55e;
            background: rgba(34,197,94,0.12);
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
        }
        .aluno-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
        }
        .aluno-item:last-child { border-bottom: none; }
        .aluno-check {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            background: rgba(34,197,94,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #22c55e;
        }
        .alunos-empty { font-size: 13px; color: var(--text-secondary); }

        .vazio { text-align: center; padding: 2rem 1rem; color: var(--text-secondary); font-size: 14px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            padding: 0.85rem 1.25rem; border-radius: 8px;
            font-size: 14px; font-weight: 600;
            opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease; pointer-events: none; z-index: 9999;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast-success { background: rgba(34,197,94,0.9); color: white; }
        .toast-error   { background: rgba(239,68,68,0.9); color: white; }
        .toast-warning { background: rgba(245,158,11,0.9); color: var(--bg); }
        .toast-info    { background: rgba(59,130,246,0.9); color: white; }

        @media (max-width: 768px) {
            .presenca-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="presenca.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
                <span>Presença</span>
            </a>
            <a href="inscricoes.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                    <rect x="9" y="3" width="6" height="4" rx="1"></rect>
                    <line x1="9" y1="12" x2="15" y2="12"></line>
                    <line x1="9" y1="16" x2="13" y2="16"></line>
                </svg>
                <span>Inscrições</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Perfil</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Controle de Presença</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="presenca-container">

                <!-- Coluna 1: seleção de curso -->
                <div class="presenca-card">
                    <h2>Selecionar Curso</h2>
                    <div class="turmas-list" id="turmasList">
                        <div class="vazio">Carregando cursos...</div>
                    </div>
                </div>

                <!-- Coluna 2: código + alunos -->
                <div class="presenca-card codigo-panel" id="codigoPanel">
                    <div class="curso-selecionado-label">
                        <span>Curso selecionado</span>
                        <strong id="cursoNome">—</strong>
                    </div>

                    <div class="codigo-box" id="codigoBox">
                        <div class="codigo-placeholder">
                            Nenhum código gerado.<br>Clique em "Gerar Código" para criar.
                        </div>
                    </div>

                    <div class="codigo-actions">
                        <button class="btn-gerar" id="btnGerar">Gerar Código</button>
                        <button class="btn-copiar" id="btnCopiar">Copiar</button>
                    </div>

                    <div class="alunos-section">
                        <div class="alunos-header">
                            <h3>Presença confirmada hoje</h3>
                            <span class="alunos-count" id="alunosCount">0</span>
                        </div>
                        <div id="alunosList">
                            <p class="alunos-empty">Selecione um curso para ver as confirmações.</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, where, doc, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        let cursoSelecionado = null;
        let meusCursos      = [];
        let codigoAtual     = null;

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }

            const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
            const userData = snap.docs[0]?.data();

            if (!userData || userData.role !== 'instrutor') {
                window.location.href = '../login.html';
                return;
            }

            carregarCursos(userData.fullName, userData.email);
        });

        async function carregarCursos(nome, email) {
            const listEl = document.getElementById('turmasList');
            try {
                const snap = await getDocs(collection(db, 'cursos'));
                meusCursos = snap.docs
                    .map(d => ({ id: d.id, ...d.data() }))
                    .filter(c =>
                        (c.instrutor === nome || c.instrutorEmail === email) &&
                        c.status === 'ativo'
                    );

                if (meusCursos.length === 0) {
                    listEl.innerHTML = `<div class="vazio">Nenhum curso ativo vinculado ao nome <strong>${nome}</strong></div>`;
                    return;
                }

                listEl.innerHTML = meusCursos.map(c => {
                    const ini = c.dataInicio?.toDate ? c.dataInicio.toDate() : new Date(c.dataInicio);
                    const fim = c.dataFim?.toDate   ? c.dataFim.toDate()   : new Date(c.dataFim);
                    return `
                        <div class="turma-item" data-id="${c.id}">
                            <div class="turma-nome">${c.titulo}</div>
                            <div class="turma-info">${c.formato} · ${ini.toLocaleDateString('pt-BR')} → ${fim.toLocaleDateString('pt-BR')}</div>
                        </div>`;
                }).join('');

                listEl.querySelectorAll('.turma-item').forEach(el =>
                    el.addEventListener('click', () => selecionarCurso(el))
                );
            } catch (err) {
                listEl.innerHTML = '<div class="vazio">Erro ao carregar cursos</div>';
                console.error(err);
            }
        }

        async function selecionarCurso(el) {
            document.querySelectorAll('.turma-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');

            cursoSelecionado = meusCursos.find(c => c.id === el.dataset.id);
            codigoAtual = cursoSelecionado.codigoPresenca || null;

            document.getElementById('cursoNome').textContent = cursoSelecionado.titulo;
            document.getElementById('codigoPanel').classList.add('visible');

            atualizarExibicaoCodigo();
            await carregarAlunosPresentes();
        }

        function atualizarExibicaoCodigo() {
            const box     = document.getElementById('codigoBox');
            const btnCop  = document.getElementById('btnCopiar');
            const btnGer  = document.getElementById('btnGerar');

            if (codigoAtual) {
                box.classList.add('tem-codigo');
                box.innerHTML = `
                    <div class="codigo-valor">${codigoAtual}</div>
                    <div class="codigo-hint">Mostre este código para os alunos presentes</div>`;
                btnCop.classList.add('visible');
                btnGer.textContent = 'Regenerar Código';
            } else {
                box.classList.remove('tem-codigo');
                box.innerHTML = `<div class="codigo-placeholder">Nenhum código gerado.<br>Clique em "Gerar Código" para criar.</div>`;
                btnCop.classList.remove('visible');
                btnGer.textContent = 'Gerar Código';
            }
        }

        function gerarCodigoAleatorio() {
            // Evita caracteres ambíguos (0/O, 1/I)
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        document.getElementById('btnGerar').addEventListener('click', async () => {
            if (!cursoSelecionado) return;
            const novo = gerarCodigoAleatorio();
            try {
                await updateDoc(doc(db, 'cursos', cursoSelecionado.id), { codigoPresenca: novo });
                codigoAtual = novo;
                cursoSelecionado.codigoPresenca = novo;
                atualizarExibicaoCodigo();
                showToast('Código gerado com sucesso!', 'success');
            } catch (err) {
                console.error(err);
                showToast('Erro ao salvar o código', 'error');
            }
        });

        document.getElementById('btnCopiar').addEventListener('click', () => {
            if (!codigoAtual) return;
            navigator.clipboard.writeText(codigoAtual)
                .then(() => showToast('Código copiado!', 'info'))
                .catch(() => showToast('Não foi possível copiar', 'warning'));
        });

        async function carregarAlunosPresentes() {
            const hoje      = new Date().toISOString().split('T')[0];
            const listEl    = document.getElementById('alunosList');
            const countEl   = document.getElementById('alunosCount');
            listEl.innerHTML = '<p class="alunos-empty">Carregando...</p>';

            try {
                const inscSnap = await getDocs(query(
                    collection(db, 'inscricoes'),
                    where('cursoId', '==', cursoSelecionado.id),
                    where('presencas', 'array-contains', hoje)
                ));

                countEl.textContent = inscSnap.size;

                if (inscSnap.empty) {
                    listEl.innerHTML = '<p class="alunos-empty">Nenhum aluno confirmou presença hoje ainda.</p>';
                    return;
                }

                const nomes = await Promise.all(
                    inscSnap.docs.map(async d => {
                        const uid   = d.data().candidatoId;
                        const uSnap = await getDocs(query(collection(db, 'users'), where('uid', '==', uid)));
                        return uSnap.docs[0]?.data()?.fullName || 'Aluno desconhecido';
                    })
                );

                listEl.innerHTML = nomes.map(nome => `
                    <div class="aluno-item">
                        <div class="aluno-check">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                        </div>
                        ${nome}
                    </div>`).join('');
            } catch (err) {
                listEl.innerHTML = '<p class="alunos-empty">Erro ao carregar confirmações.</p>';
                console.error(err);
            }
        }

        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className   = `toast toast-${type} show`;
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
