<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">      
    <title>T35 Academy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0d0d0d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
        }
        .logo-wrapper img {
            width: 180px;
            height: 180px;
            border-radius: 10px;
            opacity: 0.92;
            position: relative;
            z-index: 1;
        }
        .spinner {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            border: 3px solid rgba(255, 34, 51, 0.12);
            border-top-color: #ff2233;
            animation: spin 1.1s linear infinite;
            filter: drop-shadow(0 0 6px rgba(255, 34, 51, 0.55));
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="logo-wrapper">
            <img src="assets/img/t35logo.png" alt="T35 Academy">
            <div class="spinner"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
        import { collection, query, where, getDocs } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        const roleRoutes = {
            'admin':      'admin/dashboard.html',
            'instrutor':  'instrutor/dashboard.html',
            'candidato':  'candidato/dashboard.html'
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace('login.html');
                return;
            }

            try {
                const snap = await getDocs(
                    query(collection(db, 'users'), where('uid', '==', user.uid))
                );
                const role = snap.docs[0]?.data()?.role ?? 'candidato';
                window.location.replace(roleRoutes[role] ?? 'candidato/dashboard.html');
            } catch {
                window.location.replace('login.html');
            }
        });
    </script>
</body>
</html>
