<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .profile-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .profile-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            position: sticky;
            top: calc(60px + 2rem);
        }

        .avatar-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--amber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--bg);
            margin: 0 auto 1.25rem auto;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.25rem 0;
        }

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 1rem 0;
            word-break: break-all;
        }

        .profile-role {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(245,158,11,0.15);
            color: var(--amber);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .form-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-card-header h2 {
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .form-card-body { padding: 1.5rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full { grid-column: 1 / -1; }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-card-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .msg-success, .msg-error {
            font-size: 13px;
            font-weight: 600;
            display: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .msg-success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .msg-error { background: rgba(239,68,68,0.1); color: #ef4444; }

        .btn-save {
            padding: 0.75rem 2rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save:hover { background: var(--amber-dark); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        .hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        @media (max-width: 900px) {
            .profile-layout { grid-template-columns: 1fr; }
            .profile-card { position: static; }
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: auto; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>

        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="catalogo.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span>Catálogo</span>
            </a>
            <a href="meus-cursos.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <span>Meus Cursos</span>
            </a>
            <a href="certificados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9l6-3 6 3v6l-6 3-6-3V9z"></path>
                    <path d="M12 12v6"></path>
                </svg>
                <span>Certificados</span>
            </a>
            <a href="perfil.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Perfil</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Perfil</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="profile-layout">
                <!-- Card lateral com avatar -->
                <div class="profile-card">
                    <div class="avatar-circle" id="avatarCircle">?</div>
                    <p class="profile-name" id="profileName">Carregando...</p>
                    <p class="profile-email" id="profileEmail"></p>
                    <span class="profile-role" id="profileRole">candidato</span>
                </div>

                <!-- Formulário de edição -->
                <div class="form-card">
                    <div class="form-card-header">
                        <h2>Editar Informações</h2>
                    </div>
                    <div class="form-card-body">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label for="fullName">Nome Completo *</label>
                                <input type="text" id="fullName" placeholder="Seu nome completo">
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" disabled>
                                <span class="hint">O email não pode ser alterado</span>
                            </div>

                            <div class="form-group">
                                <label for="phone">Telefone</label>
                                <input type="tel" id="phone" placeholder="(11) 99999-9999">
                            </div>

                            <div class="form-group">
                                <label for="cpf">CPF</label>
                                <input type="text" id="cpf" disabled placeholder="000.000.000-00">
                                <span class="hint" id="hintCpf">CPF não pode ser alterado</span>
                            </div>

                            <div class="form-group">
                                <label for="matricula">Matrícula</label>
                                <input type="text" id="matricula" disabled>
                                <span class="hint" id="hintMatricula">Contate o admin para alterar</span>
                            </div>

                            <div class="form-group">
                                <label for="empresa">Empresa</label>
                                <select id="empresa">
                                    <option value="">Carregando...</option>
                                </select>
                            </div>

                            <div class="form-group full">
                                <label for="localAtuacao">Local de Atuação</label>
                                <input type="text" id="localAtuacao" placeholder="Cidade / Unidade">
                            </div>
                        </div>
                    </div>
                    <div class="form-card-footer">
                        <div>
                            <div class="msg-success" id="msgSuccess">Perfil atualizado com sucesso!</div>
                            <div class="msg-error" id="msgError"></div>
                        </div>
                        <button class="btn-save" id="btnSave">Salvar Alterações</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { formatCPF, formatPhone, validateCPF, removeCPFFormat, removePhoneFormat } from '../assets/js/utils.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, where, orderBy, doc, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        // Máscara de telefone — sempre ativa (campo sempre editável)
        document.getElementById('phone').addEventListener('input', (e) => {
            e.target.value = formatPhone(e.target.value);
        });

        let userDocId = null;

        async function loadEmpresas(valorAtual) {
            const select = document.getElementById('empresa');
            try {
                let snap;
                try {
                    snap = await getDocs(query(collection(db, 'empresas'), orderBy('nome', 'asc')));
                } catch {
                    snap = await getDocs(collection(db, 'empresas'));
                }

                const nomes = [];
                snap.forEach(d => { if (d.data().nome) nomes.push(d.data().nome); });
                nomes.sort((a, b) => a.localeCompare(b, 'pt-BR'));

                select.innerHTML = '<option value="">Selecione uma empresa</option>';
                nomes.forEach(nome => {
                    const opt = document.createElement('option');
                    opt.value = nome;
                    opt.textContent = nome;
                    if (nome === valorAtual) opt.selected = true;
                    select.appendChild(opt);
                });
            } catch (err) {
                select.innerHTML = '<option value="">Erro ao carregar empresas</option>';
                console.error('Erro ao carregar empresas:', err);
            }
        }

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }
            loadPerfil(user.uid);
        });

        async function loadPerfil(uid) {
            try {
                const q = query(collection(db, 'users'), where('uid', '==', uid));
                const snap = await getDocs(q);

                if (snap.empty) return;

                userDocId = snap.docs[0].id;
                const u = snap.docs[0].data();

                const inicial = (u.fullName || u.email || '?')[0].toUpperCase();
                document.getElementById('avatarCircle').textContent = inicial;
                document.getElementById('profileName').textContent = u.fullName || 'Sem nome';
                document.getElementById('profileEmail').textContent = u.email;
                document.getElementById('profileRole').textContent = u.role || 'candidato';

                document.getElementById('fullName').value = u.fullName || '';
                document.getElementById('email').value = u.email || '';
                document.getElementById('phone').value = formatPhone(u.phone || '');
                document.getElementById('cpf').value = u.cpf ? formatCPF(u.cpf) : '';
                document.getElementById('matricula').value = u.matricula || '';
                document.getElementById('localAtuacao').value = u.localAtuacao || '';

                await loadEmpresas(u.empresa || '');

                // Libera CPF e matrícula se ainda não foram preenchidos (ex: login via Google)
                if (!u.cpf) {
                    const cpfInput = document.getElementById('cpf');
                    cpfInput.removeAttribute('disabled');
                    document.getElementById('hintCpf').textContent = 'Preencha seu CPF para completar o cadastro';
                    cpfInput.addEventListener('input', (e) => {
                        e.target.value = formatCPF(e.target.value);
                    });
                }
                if (!u.matricula) {
                    const matInput = document.getElementById('matricula');
                    matInput.removeAttribute('disabled');
                    document.getElementById('hintMatricula').textContent = 'Preencha sua matrícula para completar o cadastro';
                }
            } catch (err) {
                console.error('Erro ao carregar perfil:', err);
            }
        }

        document.getElementById('btnSave').addEventListener('click', async () => {
            if (!userDocId) return;

            const fullName = document.getElementById('fullName').value.trim();
            if (!fullName) {
                showError('O nome completo é obrigatório');
                return;
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const cpfInput = document.getElementById('cpf');
                const matInput = document.getElementById('matricula');

                // Valida CPF se estiver editável
                if (!cpfInput.disabled) {
                    if (!validateCPF(cpfInput.value)) {
                        showError('CPF inválido');
                        btn.disabled = false;
                        btn.textContent = 'Salvar Alterações';
                        return;
                    }
                }

                const rawPhone = removePhoneFormat(document.getElementById('phone').value);
                if (rawPhone && rawPhone.length < 10) {
                    showError('Telefone inválido');
                    btn.disabled = false;
                    btn.textContent = 'Salvar Alterações';
                    return;
                }

                const updates = {
                    fullName,
                    phone: rawPhone,
                    empresa: document.getElementById('empresa').value,
                    localAtuacao: document.getElementById('localAtuacao').value.trim(),
                    updatedAt: new Date()
                };

                if (!cpfInput.disabled) {
                    updates.cpf = removeCPFFormat(cpfInput.value);
                }
                if (!matInput.disabled) {
                    updates.matricula = matInput.value.trim();
                }

                await updateDoc(doc(db, 'users', userDocId), updates);

                document.getElementById('profileName').textContent = fullName;
                document.getElementById('avatarCircle').textContent = fullName[0].toUpperCase();

                // Trava CPF e matrícula após salvar (não podem ser alterados depois)
                if (!cpfInput.disabled && cpfInput.value.trim()) {
                    cpfInput.setAttribute('disabled', '');
                    document.getElementById('hintCpf').textContent = 'CPF não pode ser alterado';
                }
                if (!matInput.disabled && matInput.value.trim()) {
                    matInput.setAttribute('disabled', '');
                    document.getElementById('hintMatricula').textContent = 'Contate o admin para alterar';
                }

                showSuccess();
            } catch (err) {
                showError('Erro ao salvar: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar Alterações';
            }
        });

        function showSuccess() {
            const el = document.getElementById('msgSuccess');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(msg) {
            const el = document.getElementById('msgError');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
