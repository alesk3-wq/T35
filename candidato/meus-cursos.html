    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>

            <a href="catalogo.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>

            <a href="meus-cursos.html" class="nav-item active">

                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <span>Meus Cursos</span>
            </a>

            <a href="certificados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9l6-3 6 3v6l-6 3-6-3V9z"></path>
                    <path d="M12 12v6"></path>
                </svg>
                <span>Certificados</span>
            </a>

            <a href="condecorados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
                <span>Condecorados</span>
            </a>
            <a href="sobre.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Sobre</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>

            <a href="manual.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Ajuda</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ✅ TOPBAR (padrão) -->
    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Meus Cursos</h1>
    </div>

    <!-- ✅ MAIN CONTENT -->
    <main class="main">
        <div class="content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="todos">Todos</button>
                <button class="tab-btn" data-tab="pendente">Pendentes</button>
                <button class="tab-btn" data-tab="aprovada">Aprovados</button>
                <button class="tab-btn" data-tab="concluido">Concluídos</button>
                <button class="tab-btn" data-tab="falta">Faltas</button>
            </div>

            <div class="cursos-grid" id="cursosGrid">
                <!-- Preenchido por JS -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <h3>Nenhum curso encontrado</h3>
                <p>Você ainda não se inscreveu em nenhum curso</p>
            </div>
        </div>
    </main>

    <!-- Modal de confirmação de presença -->
    <div class="modal" id="presencaModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:1100; align-items:center; justify-content:center;">
        <div style="background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:2rem; width:100%; max-width:380px; margin:1rem;">
            <h3 style="color:var(--text); margin:0 0 0.35rem 0; font-size:17px;">Confirmar Presença</h3>
            <p id="presencaModalCurso" style="color:var(--text-secondary); font-size:13px; margin:0 0 1.25rem 0;"></p>
            <label style="display:block; font-size:12px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.4px; margin-bottom:0.5rem;">
                Código fornecido pelo instrutor
            </label>
            <input id="codigoInput"
                type="text"
                placeholder="Ex: AB3X7K"
                maxlength="10"
                autocomplete="off"
                style="width:100%; padding:0.9rem; font-size:22px; font-family:monospace; text-transform:uppercase; letter-spacing:0.15em; text-align:center; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); outline:none; margin-bottom:0.5rem;"
            >
            <p id="presencaModalErro" style="color:#ef4444; font-size:13px; min-height:1.2em; margin:0 0 1rem 0;"></p>
            <div style="display:flex; gap:0.75rem;">
                <button id="btnCancelarPresenca"
                    style="flex:1; padding:0.75rem; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text-secondary); cursor:pointer; font-size:14px;">
                    Cancelar
                </button>
                <button id="btnEnviarCodigo"
                    style="flex:2; padding:0.75rem; background:var(--amber); border:none; border-radius:8px; color:var(--bg); font-weight:700; cursor:pointer; font-size:14px;">
                    Confirmar
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastMeusCursos" style="position:fixed; bottom:2rem; right:2rem; padding:0.85rem 1.25rem; border-radius:8px; font-size:14px; font-weight:600; opacity:0; transform:translateY(10px); transition:all 0.3s ease; pointer-events:none; z-index:9999;"></div>

    <!-- ✅ Scripts -->
    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, query, where, getDocs, doc, getDoc, updateDoc, arrayUnion
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        const btnMenu = document.getElementById('btnMenu');
        const btnLogout = document.getElementById('btnLogout');
        const cursosGrid = document.getElementById('cursosGrid');
        const emptyState = document.getElementById('emptyState');
        const tabs = document.querySelectorAll('.tab-btn');

        let allInscricoes = [];
        let currentTab = 'todos';

        btnMenu.addEventListener('click', toggleSidebar);
        btnLogout.addEventListener('click', handleLogout);
        tabs.forEach(tab => {
            tab.addEventListener('click', (e) => {
                tabs.forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentTab = e.target.dataset.tab;
                renderCursos();
            });
        });

        checkAuth().then(user => {
            if (!user) {
                window.location.href = '../login.html';
            } else {
                loadInscricoes(user.uid);
            }
        });

        function formatarData(timestamp) {
            if (!timestamp) return '—';
            const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        async function loadInscricoes(uid) {
            try {
                const q = query(collection(db, 'inscricoes'), where('candidatoId', '==', uid));
                const querySnapshot = await getDocs(q);

                const promises = querySnapshot.docs.map(async (inscricaoDoc) => {
                    const inscricao = inscricaoDoc.data();
                    const cursoDoc = await getDoc(doc(db, 'cursos', inscricao.cursoId));
                    return {
                        id: inscricaoDoc.id,
                        ...inscricao,
                        curso: cursoDoc.exists() ? cursoDoc.data() : null
                    };
                });

                allInscricoes = (await Promise.all(promises)).filter(i => i.curso !== null);
                renderCursos();
            } catch (error) {
                console.error('Erro ao carregar inscrições:', error);
            }
        }

        function renderCursos() {
            cursosGrid.innerHTML = '';

            const filtered = currentTab === 'todos'
                ? allInscricoes
                : allInscricoes.filter(i => i.status === currentTab);

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            const statusLabel = {
                'pendente':  'Pendente',
                'aprovada':  'Aprovado',
                'concluido': 'Concluído',
                'falta':     'Falta'
            };

            const hoje = new Date().toISOString().split('T')[0];

            filtered.forEach(inscricao => {
                const curso = inscricao.curso;
                const jaConfirmouHoje = (inscricao.presencas || []).includes(hoje);

                // Botão de presença só para inscrições aprovadas
                let presencaHTML = '';
                if (inscricao.status === 'aprovada') {
                    presencaHTML = jaConfirmouHoje
                        ? `<button class="btn-inscrever btn-inscrito" disabled style="margin-top:0.75rem;">
                               ✓ Presença Confirmada Hoje
                           </button>`
                        : `<button class="btn-inscrever" style="margin-top:0.75rem;"
                               onclick="abrirModalPresenca('${inscricao.id}', '${curso.titulo.replace(/'/g, "\\'")}')">
                               Confirmar Presença
                           </button>`;
                }

                // Botão de material (disponível por 7 dias após dataFim)
                let materialHTML = '';
                if (curso.material?.url) {
                    const fim = curso.dataFim?.toDate ? curso.dataFim.toDate() : (curso.dataFim ? new Date(curso.dataFim) : null);
                    const expiry = fim ? new Date(fim.getTime() + 7 * 24 * 60 * 60 * 1000) : null;
                    const disponivel = !expiry || new Date() <= expiry;
                    if (disponivel) {
                        materialHTML = `
                            <a href="${curso.material.url}" target="_blank" rel="noopener"
                               style="display:flex;align-items:center;gap:0.45rem;margin-top:0.5rem;padding:0.55rem 0.9rem;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:#3B82F6;font-size:13px;font-weight:600;text-decoration:none;width:fit-content;transition:background 0.2s;"
                               onmouseover="this.style.background='rgba(59,130,246,0.2)'" onmouseout="this.style.background='rgba(59,130,246,0.1)'">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="12" y1="18" x2="12" y2="12"/>
                                    <line x1="9" y1="15" x2="15" y2="15"/>
                                </svg>
                                Baixar Material
                            </a>`;
                    }
                }

                // Botão de vídeo aula
                let videoHTML = '';
                if (curso.videoUrl && (inscricao.status === 'aprovada' || inscricao.status === 'concluido')) {
                    const prog = inscricao.videoProgresso;
                    const pct  = prog?.percentualVideo || 0;
                    const vConcluido = prog?.concluido || false;
                    const label = vConcluido ? '✓ Aula Assistida' : pct > 0 ? `Continuar Aula (${pct}%)` : 'Assistir Aula';
                    const cor   = vConcluido ? '34,197,94' : '239,68,68';
                    videoHTML = `
                        <a href="video.html?inscricaoId=${inscricao.id}&cursoId=${inscricao.cursoId}"
                           style="display:flex;align-items:center;gap:0.45rem;margin-top:0.5rem;padding:0.55rem 0.9rem;background:rgba(${cor},0.1);border:1px solid rgba(${cor},0.25);border-radius:8px;color:rgb(${cor});font-size:13px;font-weight:600;text-decoration:none;width:fit-content;transition:background 0.2s;">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            ${label}
                        </a>`;
                }

                const card = document.createElement('div');
                card.className = `curso-card status-card-${inscricao.status}`;
                card.innerHTML = `
                    <div class="curso-header">
                        <div class="curso-header-top">
                            <h3 class="curso-title">${curso.titulo}</h3>
                            <span class="status-badge status-${inscricao.status}">
                                ${statusLabel[inscricao.status] ?? inscricao.status}
                            </span>
                        </div>
                        <p class="curso-instructor">👨‍🏫 ${curso.instrutor}</p>
                    </div>

                    <div class="curso-body">
                        <p class="curso-description">${curso.descricao ?? ''}</p>

                        <div class="curso-meta">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                ${formatarData(curso.dataInicio)} – ${formatarData(curso.dataFim)}
                                ${curso.horaInicio ? `&nbsp;·&nbsp;${curso.horaInicio}` : ''}
                            </div>
                        </div>

                        <div class="curso-meta curso-meta-info">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                ${curso.duracao}
                            </div>
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                ${curso.local}
                            </div>
                        </div>

                        ${videoHTML}
                        ${presencaHTML}
                        ${materialHTML}
                    </div>
                `;
                cursosGrid.appendChild(card);
            });
        }

        // ── Modal de presença ──────────────────────────────────────────────

        let inscricaoModalId = null;

        window.abrirModalPresenca = function(inscricaoId, cursoTitulo) {
            inscricaoModalId = inscricaoId;
            document.getElementById('presencaModalCurso').textContent = cursoTitulo;
            document.getElementById('codigoInput').value = '';
            document.getElementById('presencaModalErro').textContent = '';
            const modal = document.getElementById('presencaModal');
            modal.style.display = 'flex';
            setTimeout(() => document.getElementById('codigoInput').focus(), 50);
        };

        document.getElementById('btnCancelarPresenca').addEventListener('click', () => {
            document.getElementById('presencaModal').style.display = 'none';
        });

        document.getElementById('presencaModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('presencaModal')) {
                document.getElementById('presencaModal').style.display = 'none';
            }
        });

        document.getElementById('codigoInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('btnEnviarCodigo').click();
        });

        document.getElementById('btnEnviarCodigo').addEventListener('click', async () => {
            const codigo   = document.getElementById('codigoInput').value.trim().toUpperCase();
            const erroEl   = document.getElementById('presencaModalErro');
            const btnEnviar = document.getElementById('btnEnviarCodigo');

            erroEl.textContent = '';
            if (!codigo) { erroEl.textContent = 'Digite o código fornecido pelo instrutor.'; return; }

            btnEnviar.disabled    = true;
            btnEnviar.textContent = 'Verificando...';

            try {
                const inscricao = allInscricoes.find(i => i.id === inscricaoModalId);
                if (!inscricao) throw new Error('Inscrição não encontrada');

                // Busca o código atualizado direto do Firestore (instrutor pode ter gerado depois do carregamento)
                const cursoDoc = await getDoc(doc(db, 'cursos', inscricao.cursoId));
                const codigoEsperado = cursoDoc.data()?.codigoPresenca?.toUpperCase();

                if (!codigoEsperado) {
                    erroEl.textContent = 'O instrutor ainda não gerou um código para este curso.';
                    return;
                }

                if (codigo !== codigoEsperado) {
                    erroEl.textContent = 'Código incorreto. Verifique com o instrutor.';
                    return;
                }

                const hoje = new Date().toISOString().split('T')[0];
                await updateDoc(doc(db, 'inscricoes', inscricaoModalId), {
                    presencas: arrayUnion(hoje)
                });

                // Atualiza estado local para refletir sem recarregar tudo
                inscricao.presencas = [...(inscricao.presencas || []), hoje];

                document.getElementById('presencaModal').style.display = 'none';
                renderCursos();
                showToast('Presença confirmada com sucesso!', 'success');

            } catch (err) {
                console.error(err);
                erroEl.textContent = 'Erro ao confirmar presença. Tente novamente.';
            } finally {
                btnEnviar.disabled    = false;
                btnEnviar.textContent = 'Confirmar';
            }
        });

        function showToast(msg, type = 'info') {
            const colors = {
                success: 'rgba(34,197,94,0.9)',
                error:   'rgba(239,68,68,0.9)',
                warning: 'rgba(245,158,11,0.9)',
                info:    'rgba(59,130,246,0.9)'
            };
            const t = document.getElementById('toastMeusCursos');
            t.textContent       = msg;
            t.style.background  = colors[type] || colors.info;
            t.style.color       = type === 'warning' ? 'var(--bg)' : 'white';
            t.style.opacity     = '1';
            t.style.transform   = 'translateY(0)';
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(10px)'; }, 3000);
        }
    </script>
</body>
</html>
