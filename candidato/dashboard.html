    <title>Dashboard - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

        <nav class="sidebar-nav">

                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>

            <a href="catalogo.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <span>Catálogo</span>
            </a>

            <a href="meus-cursos.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <span>Meus Cursos</span>
            </a>

            <a href="certificados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M6 9l6-3 6 3v6l-6 3-6-3V9z"></path>
                    <path d="M12 12v6"></path>
                </svg>
                <span>Certificados</span>
            </a>

            <a href="perfil.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>

            </a>
            <a href="manual.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span>Ajuda</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ✅ TOPBAR (padrão) -->
    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Dashboard</h1>
    </div>

    <!-- ✅ MAIN CONTENT -->
    <main class="main">
        <div class="content">
            <!-- ✅ Cards de estatísticas -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📚</div>
                    <div class="stat-content">
                        <h3>Cursos Inscritos</h3>
                        <p class="stat-value" id="cursosInscritos">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <h3>Cursos Concluídos</h3>
                        <p class="stat-value" id="cursosConcluidos">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">📜</div>
                    <div class="stat-content">
                        <h3>Certificados</h3>
                        <p class="stat-value" id="certificados">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <h3>Pendentes</h3>
                        <p class="stat-value" id="pendentes">0</p>
                    </div>
                </div>
            </div>

            <!-- ✅ Cursos próximos -->
            <div class="section">
                <h2>Próximos Cursos</h2>
                <div class="cursos-grid" id="proximosCursos">
                    <!-- Preenchido por JS -->
                </div>
            </div>

            <!-- ✅ Notificações recentes -->
            <div class="section">
                <h2>Notificações Recentes</h2>
                <div class="notifications" id="notificacoes">
                    <!-- Preenchido por JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- ✅ Scripts -->
    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import { auth } from '../firebase-config.js';
        import { 
            collection, 
            query, 
            where, 
            getDocs,
            orderBy,
            limit
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        const btnMenu = document.getElementById('btnMenu');
        const btnLogout = document.getElementById('btnLogout');

        // ✅ Eventos
        btnMenu.addEventListener('click', toggleSidebar);
        btnLogout.addEventListener('click', handleLogout);

        // ✅ Verifica autenticação
        checkAuth().then(user => {
            if (!user) {
                window.location.href = '../login.html';
            } else {
                loadDashboard(user.uid);
            }
        });

        /**
         * Carrega dados do dashboard
         */
        async function loadDashboard(uid) {
            // Stats + próximos cursos
            try {
                const inscricoesSnap = await getDocs(
                    query(collection(db, 'inscricoes'), where('candidatoId', '==', uid))
                );

                let cursosInscritos = 0;
                let cursosConcluidos = 0;
                let pendentes = 0;

                inscricoesSnap.forEach((doc) => {
                    const insc = doc.data();
                    cursosInscritos++;
                    if (insc.status === 'concluido') cursosConcluidos++;
                    else if (insc.status === 'pendente') pendentes++;
                });

                document.getElementById('cursosInscritos').textContent = cursosInscritos;
                document.getElementById('cursosConcluidos').textContent = cursosConcluidos;
                document.getElementById('certificados').textContent = cursosConcluidos;
                document.getElementById('pendentes').textContent = pendentes;

                await loadProximosCursos();
            } catch (error) {
                console.error('Erro ao carregar stats:', error);
            }

            // Notificações separadas para não bloquear os stats
            try {
                const notifsSnap = await getDocs(
                    query(collection(db, 'notificacoes'), where('candidatoId', '==', uid))
                );
                renderNotificacoes(notifsSnap);
            } catch (error) {
                console.warn('Notificações indisponíveis:', error);
                document.getElementById('notificacoes').innerHTML =
                    '<p class="empty-message">Nenhuma notificação ainda</p>';
            }
        }

        function renderNotificacoes(snap) {
            const container = document.getElementById('notificacoes');
            container.innerHTML = '';

            if (snap.empty) {
                container.innerHTML = '<p class="empty-message">Nenhuma notificação ainda</p>';
                return;
            }

            const notifs = snap.docs
                .map(d => d.data())
                .sort((a, b) => {
                    const da = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt ?? 0);
                    const db_ = b.createdAt?.toDate ? b.createdAt.toDate() : new Date(b.createdAt ?? 0);
                    return db_ - da;
                })
                .slice(0, 5);

            notifs.forEach((n) => {
                const data = n.createdAt?.toDate ? n.createdAt.toDate() : new Date(n.createdAt);
                const dataStr = data.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });

                const tipos = {
                    aprovada:  { icon: '✅', cor: '#22C55E' },
                    rejeitada: { icon: '❌', cor: '#EF4444' },
                    concluido: { icon: '🎓', cor: '#3B82F6' },
                    info:      { icon: 'ℹ️', cor: '#94a3b8' }
                };
                const tipo = tipos[n.tipo] ?? tipos.info;

                const el = document.createElement('div');
                el.className = 'notification-item';
                el.innerHTML = `
                    <div class="notif-icon" style="color:${tipo.cor}">${tipo.icon}</div>
                    <div class="notif-body">
                        <p class="notif-msg">${n.mensagem ?? n.titulo ?? '—'}</p>
                        <span class="notif-date">${dataStr}</span>
                    </div>
                `;
                container.appendChild(el);
            });
        }

        /**
         * Carrega próximos cursos
         */
        async function loadProximosCursos() {
            try {
                const querySnapshot = await getDocs(
                    query(collection(db, 'cursos'), where('status', '==', 'ativo'))
                );

                const container = document.getElementById('proximosCursos');
                container.innerHTML = '';

                const hoje = new Date();
                hoje.setHours(0, 0, 0, 0);

                const cursos = querySnapshot.docs
                    .map(d => d.data())
                    .filter(c => {
                        const fim = c.dataFim?.toDate ? c.dataFim.toDate() : (c.dataFim ? new Date(c.dataFim) : null);
                        const ini = c.dataInicio?.toDate ? c.dataInicio.toDate() : new Date(c.dataInicio);
                        return fim ? fim >= hoje : ini >= hoje;
                    })
                    .sort((a, b) => {
                        const da = a.dataInicio?.toDate ? a.dataInicio.toDate() : new Date(a.dataInicio);
                        const db_ = b.dataInicio?.toDate ? b.dataInicio.toDate() : new Date(b.dataInicio);
                        return da - db_;
                    })
                    .slice(0, 3);

                if (cursos.length === 0) {
                    container.innerHTML = '<p class="empty-message">Nenhum curso disponível no momento</p>';
                    return;
                }

                cursos.forEach((curso) => {
                    const ini = curso.dataInicio?.toDate ? curso.dataInicio.toDate() : new Date(curso.dataInicio);
                    const fim = curso.dataFim?.toDate ? curso.dataFim.toDate() : (curso.dataFim ? new Date(curso.dataFim) : null);
                    const fmtDate = (d) => d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
                    const periodoStr = fim ? `${fmtDate(ini)} – ${fmtDate(fim)}` : fmtDate(ini);

                    const emAndamento = ini <= new Date();
                    const labelStatus = emAndamento
                        ? '<span class="pc-badge pc-badge-green">Em andamento</span>'
                        : '<span class="pc-badge pc-badge-amber">Em breve</span>';

                    const card = document.createElement('div');
                    card.className = 'pc-card';
                    card.innerHTML = `
                        <div class="pc-card-top">
                            <div class="pc-card-title-row">
                                <h3 class="pc-card-title">${curso.titulo}</h3>
                                ${labelStatus}
                            </div>
                            <p class="pc-card-instrutor">👨‍🏫 ${curso.instrutor}</p>
                        </div>
                        <div class="pc-card-body">
                            <div class="pc-meta">
                                <span class="pc-meta-item">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                    ${periodoStr}${curso.horaInicio ? ' · ' + curso.horaInicio : ''}
                                </span>
                                <span class="pc-meta-item">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                    ${curso.duracao}
                                </span>
                                <span class="pc-meta-item">
                                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                    ${curso.local}
                                </span>
                            </div>
                            <a href="catalogo.html" class="pc-btn">Ver no Catálogo</a>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Erro ao carregar próximos cursos:', error);
            }
        }
    </script>
</body>
</html>
