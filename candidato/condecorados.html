<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condecorados - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; max-width: 960px; }

        .page-intro {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .page-intro h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.4rem 0;
        }
        .page-intro p {
            font-size: 14px;
            color: var(--text-secondary);
            margin: 0;
        }

        .cond-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }

        .cond-card {
            background: var(--bg2);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 14px;
            overflow: hidden;
            transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 2px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(212,175,55,0.07);
        }
        .cond-card:hover {
            border-color: rgba(212,175,55,0.65);
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(0,0,0,0.45),
                        0 0 0 1px rgba(212,175,55,0.12),
                        0 0 18px rgba(212,175,55,0.1);
        }

        .cond-card-top {
            background: linear-gradient(135deg, rgba(212,175,55,0.09) 0%, rgba(212,175,55,0.02) 100%);
            padding: 1.5rem 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .cond-foto-wrap {
            position: relative;
            margin-bottom: 0.75rem;
        }
        .cond-foto {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--amber);
        }
        .cond-foto-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(212,175,55,0.15);
            border: 3px solid rgba(212,175,55,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
        }
        .medal-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 26px;
            height: 26px;
            background: var(--amber);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border: 2px solid var(--bg2);
        }

        .cond-nome {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.2rem 0;
        }
        .cond-cargo-empresa {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }

        .cond-card-body { padding: 1rem 1.25rem 1.25rem; }

        .cond-titulo {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(212,175,55,0.12);
            color: #d4af37;
            border-radius: 6px;
            padding: 0.25rem 0.65rem;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .cond-descricao {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.55;
            margin: 0 0 0.75rem 0;
        }

        .cond-data {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }
        .empty-state svg { width: 52px; height: 52px; opacity: 0.3; margin-bottom: 1rem; }
        .empty-state p { font-size: 15px; margin: 0; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Dashboard</span>
            </a>
            <a href="catalogo.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                <span>Catálogo</span>
            </a>
            <a href="meus-cursos.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <span>Meus Cursos</span>
            </a>
            <a href="certificados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6-3 6 3v6l-6 3-6-3V9z"/><path d="M12 12v6"/></svg>
                <span>Certificados</span>
            </a>
            <a href="condecorados.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
                <span>Condecorados</span>
            </a>
            <a href="sobre.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Sobre</span>
            </a>
            <a href="manual.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                <span>Ajuda</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">Condecorados</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="page-intro">
                <h2>🏅 Hall da Excelência</h2>
                <p>Colaboradores reconhecidos pelo desempenho, dedicação e contribuição ao Team35.</p>
            </div>

            <div class="cond-grid" id="condGrid">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
                    <p>Carregando...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, orderBy
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        checkAuth().then(user => {
            if (!user) { window.location.href = '../login.html'; return; }
            carregar();
        });

        async function carregar() {
            const grid = document.getElementById('condGrid');
            try {
                const snap = await getDocs(query(collection(db, 'condecorados'), orderBy('data', 'desc')));

                if (snap.empty) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>
                            <p>Nenhum condecorado cadastrado ainda.</p>
                        </div>`;
                    return;
                }

                grid.innerHTML = '';
                snap.forEach(d => {
                    const c = d.data();
                    const dataStr = c.data
                        ? new Date(c.data + 'T12:00:00').toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })
                        : null;

                    const fotoHtml = c.foto
                        ? `<img src="${c.foto}" class="cond-foto" alt="${c.nome}">`
                        : `<div class="cond-foto-placeholder">👤</div>`;

                    const cargoEmpresa = [c.cargo, c.empresa].filter(Boolean).join(' · ');

                    const card = document.createElement('div');
                    card.className = 'cond-card';
                    card.innerHTML = `
                        <div class="cond-card-top">
                            <div class="cond-foto-wrap">
                                ${fotoHtml}
                                <div class="medal-badge">🏅</div>
                            </div>
                            <h3 class="cond-nome">${c.nome}</h3>
                            ${cargoEmpresa ? `<p class="cond-cargo-empresa">${cargoEmpresa}</p>` : ''}
                        </div>
                        <div class="cond-card-body">
                            <div class="cond-titulo">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                                ${c.titulo}
                            </div>
                            ${c.descricao ? `<p class="cond-descricao">${c.descricao}</p>` : ''}
                            ${dataStr ? `<div class="cond-data">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                ${dataStr}
                            </div>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<div class="empty-state"><p>Erro ao carregar. Tente novamente.</p></div>';
            }
        }
    </script>
</body>
</html>
