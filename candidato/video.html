<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        .content { padding: 1.5rem; max-width: 900px; }

        .video-back {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-secondary);
            font-size: 13px;
            text-decoration: none;
            margin-bottom: 1rem;
            transition: color 0.2s;
        }
        .video-back:hover { color: var(--amber); }

        .video-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.25rem 0;
        }
        .video-instrutor {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 1.25rem 0;
        }

        .player-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .player-wrap iframe,
        .player-wrap #ytPlayer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .progress-bar-wrap {
            margin-top: 1rem;
            background: var(--bg2);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .stat-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .stat-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--text); }

        .progress-track {
            flex: 1;
            min-width: 180px;
        }
        .progress-track-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }
        .progress-track-bar {
            height: 6px;
            background: var(--border);
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-track-fill {
            height: 100%;
            background: var(--amber);
            border-radius: 999px;
            transition: width 1s linear;
        }

        .badge-concluido {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.9rem;
            background: rgba(34,197,94,0.12);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }

        .video-desc {
            margin-top: 1rem;
            background: var(--bg2);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .no-video {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        .no-video svg { width: 56px; height: 56px; opacity: 0.3; margin-bottom: 1rem; }
    </style>
</head>
<body>

        <nav class="sidebar-nav">

                <span>Dashboard</span>

                <span>Meus Cursos</span>
            </a>
            <a href="certificados.html" class="nav-item">

            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">Vídeo Aula</h1>
    </div>

    <main class="main">
        <div class="content" id="pageContent">
            <div style="color:var(--text-secondary);padding:3rem;text-align:center">Carregando...</div>
        </div>
    </main>

    <!-- YouTube IFrame API (carregado globalmente antes do módulo) -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            doc, getDoc, updateDoc, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        const params      = new URLSearchParams(location.search);
        const inscricaoId = params.get('inscricaoId');
        const cursoId     = params.get('cursoId');

        // ── Estado de rastreamento ─────────────────────────────────────────
        let player        = null;
        let tempoTela     = 0;      // segundos reais na página (timer pausa quando aba oculta)
        let timerInterval = null;
        let playerReady   = false;
        let jaConcluido   = false;
        let progresso     = {};     // dados atuais do Firestore

        // ── Utilitários ────────────────────────────────────────────────────
        function extrairVideoId(url) {
            if (!url) return null;
            const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function formatarTempo(seg) {
            const m = Math.floor(seg / 60);
            const s = seg % 60;
            return `${m}m ${String(s).padStart(2,'0')}s`;
        }

        function getPercentual() {
            if (!player?.getDuration) return 0;
            const dur = player.getDuration();
            if (!dur) return 0;
            return Math.min(100, Math.round((player.getCurrentTime() / dur) * 100));
        }

        function getDuracao() {
            if (!player?.getDuration) return 0;
            return Math.round(player.getDuration());
        }

        // ── Timer de tempo real na tela ────────────────────────────────────
        function iniciarTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                tempoTela++;
                atualizarUI();
                if (tempoTela % 30 === 0) salvarProgresso();
            }, 1000);
        }

        function pausarTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        // Pausa quando usuário troca de aba / minimiza
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                pausarTimer();
            } else if (player?.getPlayerState?.() === 1) {
                iniciarTimer();
            }
        });

        // Salva ao fechar/sair da página
        window.addEventListener('beforeunload', () => salvarProgresso(true));

        // ── Salvar progresso no Firestore ──────────────────────────────────
        async function salvarProgresso(sincronous = false) {
            if (!inscricaoId) return;
            const pct      = getPercentual();
            const dur      = getDuracao();
            const concluido = pct >= 80;
            const suspeito  = concluido && dur > 0 && tempoTela < dur * 0.5;

            const dados = {
                videoProgresso: {
                    percentualVideo: pct,
                    tempoTela,
                    videoDuracao: dur,
                    ultimoAcesso: serverTimestamp(),
                    concluido,
                    suspeito
                }
            };

            if (concluido && !jaConcluido) {
                jaConcluido = true;
                mostrarBadgeConcluido();
            }

            try {
                await updateDoc(doc(db, 'inscricoes', inscricaoId), dados);
            } catch (e) {
                console.warn('[video] erro ao salvar progresso:', e);
            }
        }

        // ── Atualizar UI de progresso ──────────────────────────────────────
        function atualizarUI() {
            const pct = getPercentual();
            const dur = getDuracao();

            const fillEl = document.getElementById('progressFill');
            const pctEl  = document.getElementById('statPct');
            const tempoEl = document.getElementById('statTempo');
            const durEl  = document.getElementById('statDur');

            if (fillEl)  fillEl.style.width  = pct + '%';
            if (pctEl)   pctEl.textContent   = pct + '%';
            if (tempoEl) tempoEl.textContent  = formatarTempo(tempoTela);
            if (durEl && dur) durEl.textContent = formatarTempo(dur);

            const pctLbl = document.getElementById('pctLabel');
            if (pctLbl) pctLbl.textContent = pct + '%';
        }

        function mostrarBadgeConcluido() {
            const el = document.getElementById('badgeConcluido');
            if (el) el.style.display = 'inline-flex';
        }

        // ── YouTube IFrame API callbacks (globais) ─────────────────────────
        window.onYouTubeIframeAPIReady = function() {
            // aguarda o elemento existir (pode ser chamado antes do render)
            const tentativas = setInterval(() => {
                if (document.getElementById('ytPlayer')) {
                    clearInterval(tentativas);
                    iniciarPlayer();
                }
            }, 100);
        };

        function iniciarPlayer() {
            player = new YT.Player('ytPlayer', {
                events: {
                    onReady(e) {
                        playerReady = true;
                        // Retoma posição anterior se houver progresso salvo
                        if (progresso.percentualVideo > 0 && progresso.percentualVideo < 95) {
                            const dur = e.target.getDuration();
                            const pos = Math.round((progresso.percentualVideo / 100) * dur);
                            if (pos > 10) e.target.seekTo(pos, true);
                        }
                        atualizarUI();
                    },
                    onStateChange(e) {
                        // 1 = playing, 2 = paused, 0 = ended
                        if (e.data === YT.PlayerState.PLAYING) {
                            iniciarTimer();
                        } else {
                            pausarTimer();
                            salvarProgresso();
                        }
                        if (e.data === YT.PlayerState.ENDED) {
                            salvarProgresso();
                        }
                    }
                }
            });
        }

        // ── Render da página ───────────────────────────────────────────────
        async function renderPagina(curso) {
            const videoId = extrairVideoId(curso.videoUrl);
            const content = document.getElementById('pageContent');

            if (!videoId) {
                content.innerHTML = `
                    <div class="no-video">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        <p>Nenhum vídeo disponível para este curso.</p>
                    </div>`;
                return;
            }

            const dur = progresso.videoDuracao ? formatarTempo(progresso.videoDuracao) : '--';
            const pct = progresso.percentualVideo || 0;

            content.innerHTML = `
                <a href="meus-cursos.html" class="video-back">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                    Voltar para Meus Cursos
                </a>

                <h1 class="video-title">${curso.titulo}</h1>
                <p class="video-instrutor">👨‍🏫 ${curso.instrutor}</p>

                <div class="player-wrap">
                    <iframe
                        id="ytPlayer"
                        src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&rel=0&modestbranding=1"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                        allowfullscreen>
                    </iframe>
                </div>

                <div class="progress-bar-wrap">
                    <div class="stat-item">
                        <span class="stat-label">Assistido</span>
                        <span class="stat-value" id="statPct">${pct}%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Tempo na tela</span>
                        <span class="stat-value" id="statTempo">${formatarTempo(tempoTela)}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Duração</span>
                        <span class="stat-value" id="statDur">${dur}</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-track-label">
                            <span>Progresso</span>
                            <span id="pctLabel">${pct}%</span>
                        </div>
                        <div class="progress-track-bar">
                            <div class="progress-track-fill" id="progressFill" style="width:${pct}%"></div>
                        </div>
                    </div>
                    <span class="badge-concluido" id="badgeConcluido" style="${progresso.concluido ? '' : 'display:none'}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        Aula concluída
                    </span>
                </div>

                ${curso.descricao ? `<div class="video-desc">${curso.descricao}</div>` : ''}
            `;

            jaConcluido = progresso.concluido || false;
            tempoTela   = progresso.tempoTela || 0;

            // Se API do YouTube já estava pronta antes do render, inicia o player agora
            if (window.YT?.Player) iniciarPlayer();
        }

        // ── Inicialização ──────────────────────────────────────────────────
        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }
            if (!inscricaoId || !cursoId) { window.location.href = 'meus-cursos.html'; return; }

            try {
                const [inscricaoSnap, cursoSnap] = await Promise.all([
                    getDoc(doc(db, 'inscricoes', inscricaoId)),
                    getDoc(doc(db, 'cursos', cursoId))
                ]);

                if (!inscricaoSnap.exists() || inscricaoSnap.data().candidatoId !== user.uid) {
                    window.location.href = 'meus-cursos.html';
                    return;
                }

                progresso = inscricaoSnap.data().videoProgresso || {};
                const curso = cursoSnap.data();

                await renderPagina(curso);
            } catch (err) {
                console.error(err);
                document.getElementById('pageContent').innerHTML =
                    '<p style="color:var(--text-secondary);padding:2rem">Erro ao carregar o vídeo.</p>';
            }
        });
    </script>
</body>
