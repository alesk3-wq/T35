<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400;1,700&display=swap">
    <!-- jsPDF + html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .content { padding: 2rem; }

        .certs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .cert-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .cert-card:hover {
            border-color: var(--amber);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .cert-banner {
            height: 80px;
            background: linear-gradient(135deg, var(--amber), #d97706);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cert-banner svg { opacity: 0.9; }

        .cert-body { padding: 1.5rem; }

        .cert-titulo {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.5rem 0;
        }

        .cert-instrutor {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 1rem 0;
        }

        .cert-info {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }

        .cert-info-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .cert-info-row svg { flex-shrink: 0; }

        .cert-num {
            font-size: 11px;
            font-family: monospace;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
        }

        .cert-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.1rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-download:hover { background: #d97706; }
        .btn-download:disabled { opacity: 0.55; cursor: not-allowed; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
            background: var(--bg2);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .empty-state svg {
            width: 64px; height: 64px;
            opacity: 0.3;
            margin-bottom: 1.25rem;
        }

        .empty-state h3 { color: var(--text); font-size: 18px; margin: 0 0 0.5rem 0; }
        .empty-state p  { font-size: 14px; margin: 0; }

        .page-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }

        .page-title-row h1 { color: var(--text); font-size: 28px; margin: 0; }

        .count-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.4rem 0.9rem;
            background: rgba(245,158,11,0.15);
            color: var(--amber);
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
        }

        @media (max-width: 600px) {
            .certs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>

            </a>
            <a href="catalogo.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>

            <a href="meus-cursos.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>

                <span>Condecorados</span>

            <a href="sobre.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span>Sobre</span>

            <a href="manual.html" class="nav-item">

                </svg>

            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Certificados</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="page-title-row">
                <h1>Meus Certificados</h1>
                <span class="count-badge" id="certCount" style="display:none"></span>
            </div>
            <div id="certsContainer">
                <p style="color:var(--text-secondary);font-size:14px;">Carregando...</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, where, doc, getDoc
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        let _userName = '';

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }

            const userSnap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
            if (!userSnap.empty) _userName = userSnap.docs[0].data().fullName || user.displayName || 'Participante';

            loadCertificados(user.uid);
        });

        async function loadCertificados(uid) {
            const container = document.getElementById('certsContainer');
            try {
                const q = query(
                    collection(db, 'inscricoes'),
                    where('candidatoId', '==', uid),
                    where('status', '==', 'concluido')
                );
                const snap = await getDocs(q);

                const promises = snap.docs.map(async d => {
                    const insc = d.data();
                    const cursoDoc = await getDoc(doc(db, 'cursos', insc.cursoId));
                    return { id: d.id, ...insc, curso: cursoDoc.exists() ? cursoDoc.data() : null };
                });

                const concluidos = (await Promise.all(promises)).filter(i => i.curso);

                if (concluidos.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6-3 6 3v6l-6 3-6-3V9z"></path>
                                <path d="M12 12v6"></path>
                            </svg>
                            <h3>Nenhum certificado ainda</h3>
                            <p>Conclua um curso para receber seu certificado</p>
                        </div>`;
                    return;
                }

                const badge = document.getElementById('certCount');
                badge.textContent = `${concluidos.length} certificado${concluidos.length > 1 ? 's' : ''}`;
                badge.style.display = 'inline-flex';

                container.innerHTML = `<div class="certs-grid" id="certsGrid"></div>`;
                const grid = document.getElementById('certsGrid');

                concluidos.forEach(insc => {
                    const curso = insc.curso;
                    const numCert = numeroCertificado(insc.id);
                    const dataConcl = dataConclucao(insc);

                    const card = document.createElement('div');
                    card.className = 'cert-card';
                    card.innerHTML = `
                        <div class="cert-banner">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                                <circle cx="12" cy="8" r="6"></circle>
                                <path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"></path>
                            </svg>
                        </div>
                        <div class="cert-body">
                            <h3 class="cert-titulo">${curso.titulo}</h3>
                            <p class="cert-instrutor">👨‍🏫 ${curso.instrutor}</p>
                            <div class="cert-info">
                                <div class="cert-info-row">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                    Concluído em ${dataConcl}
                                </div>
                                ${curso.duracao ? `<div class="cert-info-row">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                                    </svg>
                                    Carga horária: ${curso.duracao}
                                </div>` : ''}
                            </div>
                            <span class="cert-num">Nº ${numCert}</span>
                        </div>
                        <div class="cert-footer">
                            <button class="btn-download">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                Baixar PDF
                            </button>
                        </div>
                    `;

                    card.querySelector('.btn-download').addEventListener('click', (e) => {
                        gerarCertificado(insc, e.currentTarget);
                    });

                    grid.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="color:var(--text-secondary)">Erro ao carregar certificados.</p>';
            }
        }

        // ── Geração do PDF ────────────────────────────────────────────────

        async function gerarCertificado(insc, btn) {
            btn.disabled = true;
            btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Gerando...`;

            try {
                const { jsPDF } = window.jspdf;
                const curso     = insc.curso;
                const numCert   = numeroCertificado(insc.id);
                const dataConcl = dataConclucao(insc);

                // Logo em base64 para evitar CORS no canvas
                let logoB64 = '';
                try { logoB64 = await imgToBase64('../assets/img/t35logo.png'); } catch(_) {}

                // Monta o elemento do certificado fora da tela
                const el = document.createElement('div');
                el.style.cssText = 'position:absolute;top:0;left:-1200px;width:1122px;height:794px;';
                el.innerHTML = buildCertHTML(curso, numCert, dataConcl, logoB64);
                document.body.appendChild(el);

                // Aguarda fontes e um frame de pintura
                await document.fonts.ready;
                await new Promise(r => setTimeout(r, 250));

                const canvas = await html2canvas(el, {
                    scale: 2,
                    useCORS: true,
                    allowTaint: false,
                    backgroundColor: '#fffef8',
                    width: 1122,
                    height: 794,
                    logging: false
                });

                document.body.removeChild(el);

                const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
                pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 297, 210);

                const nomeArquivo = `certificado-${curso.titulo.replace(/\s+/g,'-').replace(/[^a-zA-Z0-9-]/g,'').toLowerCase()}-${numCert}.pdf`;
                pdf.save(nomeArquivo);

            } catch (err) {
                console.error('Erro ao gerar certificado:', err);
                alert('Não foi possível gerar o certificado. Tente novamente.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Baixar PDF`;
            }
        }

        function buildCertHTML(curso, numCert, dataConcl, logoB64) {
            const logoSmall = logoB64
                ? `<img src="${logoB64}" style="width:70px;height:70px;object-fit:contain;border-radius:12px;display:block;">`
                : '';
            const logoLarge = logoB64
                ? `<img src="${logoB64}" style="width:100%;height:100%;object-fit:contain;border-radius:18px;display:block;">`
                : '';
            const instrutor = curso.duracao
                ? `Ministrado por <strong style="color:#555;">${curso.instrutor}</strong> &nbsp;·&nbsp; Carga horária: <strong style="color:#555;">${curso.duracao}</strong>`
                : `Ministrado por <strong style="color:#555;">${curso.instrutor}</strong>`;

            return `
            <div style="width:1122px;height:794px;background:#fffef8;position:relative;overflow:hidden;box-sizing:border-box;font-family:Georgia,serif;">

                <!-- Listras vermelhas -->
                <div style="position:absolute;top:0;left:0;right:0;height:9px;background:linear-gradient(90deg,#cc1122,#ff2233,#cc1122);"></div>
                <div style="position:absolute;bottom:0;left:0;right:0;height:9px;background:linear-gradient(90deg,#cc1122,#ff2233,#cc1122);"></div>

                <!-- Bordas douradas -->
                <div style="position:absolute;top:18px;left:18px;right:18px;bottom:18px;border:1.5px solid #c9a227;box-sizing:border-box;"></div>
                <div style="position:absolute;top:24px;left:24px;right:24px;bottom:24px;border:0.5px solid rgba(201,162,39,0.4);box-sizing:border-box;"></div>

                <!-- Cantos ornamentais -->
                <div style="position:absolute;top:10px;left:10px;width:40px;height:40px;border-top:2px solid #c9a227;border-left:2px solid #c9a227;"></div>
                <div style="position:absolute;top:10px;right:10px;width:40px;height:40px;border-top:2px solid #c9a227;border-right:2px solid #c9a227;"></div>
                <div style="position:absolute;bottom:10px;left:10px;width:40px;height:40px;border-bottom:2px solid #c9a227;border-left:2px solid #c9a227;"></div>
                <div style="position:absolute;bottom:10px;right:10px;width:40px;height:40px;border-bottom:2px solid #c9a227;border-right:2px solid #c9a227;"></div>

                <!-- Logo grande decorativa à esquerda (metade visível) -->
                <div style="position:absolute;top:50%;transform:translateY(-50%);left:-180px;width:540px;height:540px;opacity:0.32;">
                    ${logoLarge}
                </div>

                <!-- Brilho radial sutil -->
                <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(201,162,39,0.05) 0%,transparent 60%);pointer-events:none;"></div>

                <!-- CONTEÚDO: 3 seções distribuídas verticalmente -->
                <div style="position:absolute;top:28px;left:40px;right:40px;bottom:28px;display:flex;flex-direction:column;justify-content:space-between;align-items:center;text-align:center;">

                    <!-- ── TOPO ── -->
                    <div style="display:flex;flex-direction:column;align-items:center;gap:0;padding-top:8px;">
                        ${logoSmall}
                        <div style="font-size:13px;letter-spacing:5px;color:#8a6010;text-transform:uppercase;font-weight:bold;margin-top:12px;">
                            Team35 Academy
                        </div>
                        <div style="width:140px;height:1.5px;background:linear-gradient(90deg,transparent,#c9a227,transparent);margin:12px 0;"></div>
                        <div style="font-size:27px;font-weight:bold;color:#1a1a2e;letter-spacing:4px;text-transform:uppercase;">
                            Certificado de Conclusão
                        </div>
                    </div>

                    <!-- ── CORPO ── -->
                    <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
                        <div style="font-size:15px;color:#666;font-style:italic;margin-bottom:10px;">
                            Certificamos que
                        </div>
                        <div style="font-family:'Playfair Display',Georgia,serif;font-size:46px;font-style:italic;font-weight:700;color:#1a1a2e;line-height:1.15;border-bottom:1px solid #1a1a2e;padding-bottom:8px;max-width:740px;">
                            ${_userName}
                        </div>
                        <div style="font-size:15px;color:#666;font-style:italic;margin-top:16px;margin-bottom:10px;">
                            concluiu com êxito o curso
                        </div>
                        <div style="font-size:20px;font-weight:bold;color:#1a1a2e;text-transform:uppercase;letter-spacing:1.5px;max-width:740px;line-height:1.5;">
                            ${curso.titulo}
                        </div>
                        <div style="font-size:13px;color:#666;margin-top:10px;">${instrutor}</div>
                    </div>

                    <!-- ── RODAPÉ ── -->
                    <div style="display:flex;align-items:flex-end;justify-content:space-between;width:100%;padding:0 20px 6px;box-sizing:border-box;">

                        <!-- Esquerda: Nº e data -->
                        <div style="text-align:left;">
                            <div style="font-family:monospace;font-size:11px;color:#777;letter-spacing:1px;">CERTIFICADO Nº ${numCert}</div>
                            <div style="font-size:11px;color:#777;margin-top:3px;">Emitido em ${dataConcl}</div>
                        </div>

                        <!-- Direita: Assinatura + Selo -->
                        <div style="display:flex;align-items:flex-end;gap:18px;">
                            <div style="text-align:center;">
                                <div style="width:140px;height:1px;background:#777;margin-bottom:5px;"></div>
                                <div style="font-size:11px;color:#777;">T35 Academy &copy; 2025</div>
                            </div>
                            <!-- Selo circular -->
                            <div style="width:76px;height:76px;border-radius:50%;border:1.5px solid #c9a227;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(201,162,39,0.06);flex-shrink:0;">
                                <div style="font-size:8px;font-weight:bold;color:#8a6010;letter-spacing:2px;text-transform:uppercase;line-height:1.8;">TEAM</div>
                                <div style="font-size:19px;font-weight:bold;color:#c9a227;line-height:1;">35</div>
                                <div style="font-size:7px;font-weight:bold;color:#8a6010;letter-spacing:1.5px;text-transform:uppercase;line-height:1.8;">ACADEMY</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // ── Helpers ───────────────────────────────────────────────────────

        function numeroCertificado(id) {
            const c = id.replace(/[^A-Z0-9]/gi, '').toUpperCase().padEnd(8, '0').slice(0, 8);
            return `${c.slice(0, 4)}-${c.slice(4, 8)}`;
        }

        function dataConclucao(insc) {
            const presencas = insc.presencas;
            if (Array.isArray(presencas) && presencas.length > 0) {
                const last = [...presencas].sort().pop();
                const [y, m, d] = last.split('-');
                return `${d}/${m}/${y}`;
            }
            const ts = insc.updatedAt || insc.createdAt;
            if (!ts) return '—';
            const dt = ts.toDate ? ts.toDate() : new Date(ts);
            return dt.toLocaleDateString('pt-BR');
        }

        function imgToBase64(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    const c = document.createElement('canvas');
                    c.width = img.width; c.height = img.height;
                    c.getContext('2d').drawImage(img, 0, 0);
                    resolve(c.toDataURL('image/png'));
                };
                img.onerror = reject;
                img.src = url;
            });
        }
    </script>
</body>
</html>
