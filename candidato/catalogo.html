    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .badge-encerrado {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.6rem;
            background: rgba(100,116,139,0.2);
            color: #94a3b8;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-encerrado {
            background: var(--bg) !important;
            border: 1px solid var(--border) !important;
            color: var(--text-secondary) !important;
            cursor: not-allowed !important;
        }

        .curso-card.encerrado { opacity: 0.7; }

        .badge-video {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            background: rgba(239,68,68,0.12);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <!-- ✅ SIDEBAR -->

        <nav class="sidebar-nav">

                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>

            <a href="catalogo.html" class="nav-item active">

            <a href="meus-cursos.html" class="nav-item">

                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                <span>Meus Cursos</span>
            </a>

            <a href="certificados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            <a href="condecorados.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>

            <a href="perfil.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>

                <span>Ajuda</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ✅ TOPBAR -->
    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Catálogo de Cursos</h1>
    </div>

    <!-- ✅ MAIN CONTENT -->
    <main class="main">
        <div class="content">
            <div class="filters">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="filter-input" 
                    placeholder="Buscar cursos..."
                >
            </div>

            <div id="cursosContainer" class="cursos-grid">
                <!-- Preenchido por JS -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                </svg>
                <h3>Nenhum curso encontrado</h3>
                <p>Tente uma busca diferente ou volte mais tarde</p>
            </div>
        </div>
    </main>

    <!-- ✅ Scripts -->
    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db, auth } from '../firebase-config.js';
        import { collection, query, where, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';

        const btnMenu = document.getElementById('btnMenu');
        const btnLogout = document.getElementById('btnLogout');
        const searchInput = document.getElementById('searchInput');
        const cursosContainer = document.getElementById('cursosContainer');
        const emptyState = document.getElementById('emptyState');

        let todosOsCursos = [];
        let inscricoesSet = new Set();

        btnMenu.addEventListener('click', toggleSidebar);
        btnLogout.addEventListener('click', handleLogout);
        searchInput.addEventListener('input', filtrarCursos);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loadDados(user);
            } else {
                window.location.href = '../login.html';
            }
        });

        function formatarData(timestamp) {
            if (!timestamp) return '—';
            const d = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
            return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        async function loadDados(user) {
            try {
                const [cursosSnap, inscricoesSnap] = await Promise.all([
                    getDocs(query(collection(db, 'cursos'), where('status', '==', 'ativo'))),
                    getDocs(query(collection(db, 'inscricoes'), where('candidatoId', '==', user.uid)))
                ]);

                inscricoesSet = new Set(inscricoesSnap.docs.map(d => d.data().cursoId));
                todosOsCursos = cursosSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizarCursos(todosOsCursos);
            } catch (error) {
                console.error('Erro ao carregar cursos:', error);
                emptyState.style.display = 'block';
            }
        }

        function cursoEncerrado(curso) {
            if (!curso.dataFim) return false;
            const fim = curso.dataFim.toDate ? curso.dataFim.toDate() : new Date(curso.dataFim);
            fim.setHours(23, 59, 59, 999);
            return fim < new Date();
        }

        function renderizarCursos(cursos) {
            cursosContainer.innerHTML = '';

            if (cursos.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            cursos.forEach((curso) => {
                const inscrito    = inscricoesSet.has(curso.id);
                const encerrado   = cursoEncerrado(curso);
                const bloqueado   = inscrito || encerrado;

                const card = document.createElement('div');
                card.className = `curso-card${encerrado ? ' encerrado' : ''}`;
                card.innerHTML = `
                    <div class="curso-header">
                        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;margin-bottom:0.25rem;">
                            <h3 class="curso-title" style="margin:0">${curso.titulo}</h3>
                            <div style="display:flex;gap:0.35rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;">
                                ${curso.videoUrl ? `<span class="badge-video"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Vídeo Aula</span>` : ''}
                                ${encerrado ? '<span class="badge-encerrado">Encerrado</span>' : ''}
                            </div>
                        </div>
                        <p class="curso-instructor">👨‍🏫 ${curso.instrutor}</p>
                    </div>

                    <div class="curso-body">
                        <p class="curso-description">${curso.descricao}</p>

                        <div class="curso-meta">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                ${formatarData(curso.dataInicio)} – ${formatarData(curso.dataFim)}
                                ${curso.horaInicio ? `&nbsp;·&nbsp;${curso.horaInicio}` : ''}
                            </div>
                        </div>

                        <div class="curso-meta curso-meta-info">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                                ${curso.duracao}
                            </div>
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                    <circle cx="12" cy="10" r="3"></circle>
                                </svg>
                                ${curso.local}
                            </div>
                        </div>

                        <button
                            class="btn-inscrever ${encerrado ? 'btn-encerrado' : (inscrito ? 'btn-inscrito' : '')}"
                            data-curso-id="${curso.id}"
                            ${bloqueado ? 'disabled' : `onclick="inscreverCurso('${curso.id}')"`}
                        >
                            ${encerrado ? 'Encerrado' : (inscrito ? '✓ Inscrito' : 'Inscrever-se')}
                        </button>
                    </div>
                `;
                cursosContainer.appendChild(card);
            });
        }

        function filtrarCursos() {
            const termo = searchInput.value.toLowerCase();
            const cursosFiltrados = todosOsCursos.filter((curso) => {
                return (
                    curso.titulo.toLowerCase().includes(termo) ||
                    curso.descricao.toLowerCase().includes(termo) ||
                    curso.instrutor.toLowerCase().includes(termo)
                );
            });
            renderizarCursos(cursosFiltrados);
        }

        window.inscreverCurso = async function(cursoId) {
            const user = auth.currentUser;
            if (!user) {
                alert('Você precisa estar logado para se inscrever');
                return;
            }

            const curso = todosOsCursos.find(c => c.id === cursoId);
            if (curso && cursoEncerrado(curso)) {
                alert('As inscrições para este curso estão encerradas.');
                return;
            }

            const btn = document.querySelector(`button[data-curso-id="${cursoId}"]`);
            if (btn) {
                btn.disabled = true;
                btn.textContent = 'Inscrevendo...';
            }

            try {
                const q = query(
                    collection(db, 'inscricoes'),
                    where('candidatoId', '==', user.uid),
                    where('cursoId', '==', cursoId)
                );
                const snap = await getDocs(q);

                if (!snap.empty) {
                    inscricoesSet.add(cursoId);
                    if (btn) {
                        btn.classList.add('btn-inscrito');
                        btn.textContent = '✓ Inscrito';
                        btn.removeAttribute('onclick');
                    }
                    return;
                }

                await addDoc(collection(db, 'inscricoes'), {
                    candidatoId: user.uid,
                    cursoId,
                    status: 'pendente',
                    dataInscricao: new Date(),
                    createdAt: new Date()
                });

                inscricoesSet.add(cursoId);
                if (btn) {
                    btn.classList.add('btn-inscrito');
                    btn.textContent = '✓ Inscrito';
                    btn.removeAttribute('onclick');
                }

                alert('Inscrição realizada com sucesso! Aguarde aprovação.');
            } catch (error) {
                console.error('Erro ao inscrever:', error);
                alert('Erro ao se inscrever no curso');
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = 'Inscrever-se';
                }
            }
        };
    </script>
</body>
</html>
