<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições - T35 Academy Admin</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 { color: var(--text); font-size: 26px; margin: 0; }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filters input,
        .filters select {
            padding: 0.65rem 1rem;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            min-width: 180px;
        }
        .filters input { flex: 1; }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            text-align: center;
        }
        .summary-card .s-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
            margin-bottom: 0.25rem;
        }
        .summary-card .s-label {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .s-pendente  { color: var(--amber) !important; }
        .s-aprovada  { color: #22c55e !important; }
        .s-concluido { color: #3b82f6 !important; }
        .s-rejeitada { color: #ef4444 !important; }

        .table-container {
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead { background: var(--bg); border-bottom: 2px solid var(--border); }
        th {
            padding: 0.9rem 1rem;
            text-align: left;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 13px;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: rgba(245,158,11,0.04); }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 0.2rem 0.65rem;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .status-pendente  { background: rgba(245,158,11,0.12); color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
        .status-aprovada  { background: rgba(34,197,94,0.12);  color: #22c55e;       border: 1px solid rgba(34,197,94,0.3); }
        .status-concluido { background: rgba(59,130,246,0.12); color: #3b82f6;       border: 1px solid rgba(59,130,246,0.3); }
        .status-rejeitada { background: rgba(239,68,68,0.12);  color: #ef4444;       border: 1px solid rgba(239,68,68,0.3); }

        .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .btn-action {
            padding: 0.35rem 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn-aprovar   { background: rgba(34,197,94,0.15);  color: #22c55e; }
        .btn-aprovar:hover   { background: rgba(34,197,94,0.3); }
        .btn-rejeitar  { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .btn-rejeitar:hover  { background: rgba(239,68,68,0.3); }
        .btn-concluir  { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .btn-concluir:hover  { background: rgba(59,130,246,0.3); }
        .btn-reativar  { background: rgba(245,158,11,0.15); color: var(--amber); }
        .btn-reativar:hover  { background: rgba(245,158,11,0.3); }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 1.25rem;
            display: none;
        }
        .alert-success { background: rgba(34,197,94,0.12); color: #22c55e;  border: 1px solid rgba(34,197,94,0.3); }
        .alert-error   { background: rgba(239,68,68,0.12); color: #ef4444;  border: 1px solid rgba(239,68,68,0.3); }

        @media (max-width: 768px) {
            .filters { flex-direction: column; }
            .filters input, .filters select { min-width: auto; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>

        <nav class="sidebar-nav">

                    <polyline points="9 22 9 12 15 12 15 22"></polyline>

        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Inscrições</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="page-header">
                <h1>Gerenciar Inscrições</h1>
            </div>

            <div id="alertSuccess" class="alert alert-success"></div>
            <div id="alertError"   class="alert alert-error"></div>

            <!-- Resumo -->
            <div class="summary-grid">
                <div class="summary-card">
                    <div class="s-value" id="cntTotal">—</div>
                    <div class="s-label">Total</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-pendente" id="cntPendente">—</div>
                    <div class="s-label">Pendentes</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-aprovada" id="cntAprovada">—</div>
                    <div class="s-label">Aprovadas</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-concluido" id="cntConcluido">—</div>
                    <div class="s-label">Concluídas</div>
                </div>
                <div class="summary-card">
                    <div class="s-value s-rejeitada" id="cntRejeitada">—</div>
                    <div class="s-label">Rejeitadas</div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Buscar por aluno ou curso...">
                <select id="statusFilter">
                    <option value="">Todos os status</option>
                    <option value="pendente">Pendentes</option>
                    <option value="aprovada">Aprovadas</option>
                    <option value="concluido">Concluídas</option>
                    <option value="rejeitada">Rejeitadas</option>
                </select>
                <select id="cursoFilter">
                    <option value="">Todos os cursos</option>
                </select>
            </div>

            <!-- Tabela -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Candidato</th>
                            <th>Empresa</th>
                            <th>Curso</th>
                            <th>Instrutor</th>
                            <th>Data Inscrição</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="inscricoesList">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-secondary)">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
        import {
            collection, getDocs, doc, updateDoc,
            query, where, orderBy, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);
        document.getElementById('searchInput').addEventListener('input', renderTabela);
        document.getElementById('statusFilter').addEventListener('change', renderTabela);
        document.getElementById('cursoFilter').addEventListener('change', renderTabela);

        let todasInscricoes = [];

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '../login.html'; return; }

            const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
            if (snap.docs[0]?.data()?.role !== 'admin') {
                alert('Acesso negado!');
                window.location.href = '../login.html';
                return;
            }

            carregarDados();
        });

        async function carregarDados() {
            try {
                // 3 queries paralelas
                const [inscSnap, usersSnap, cursosSnap] = await Promise.all([
                    getDocs(query(collection(db, 'inscricoes'), orderBy('createdAt', 'desc'))),
                    getDocs(collection(db, 'users')),
                    getDocs(collection(db, 'cursos'))
                ]);

                // Mapas para lookup eficiente
                const usersMap = {};
                usersSnap.forEach(d => { usersMap[d.data().uid] = d.data(); });

                const cursosMap = {};
                cursosSnap.forEach(d => { cursosMap[d.id] = d.data(); });

                // Popula select de cursos
                const cursoSelect = document.getElementById('cursoFilter');
                cursosSnap.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.id;
                    opt.textContent = d.data().titulo;
                    cursoSelect.appendChild(opt);
                });

                todasInscricoes = inscSnap.docs.map(d => ({
                    id: d.id,
                    ...d.data(),
                    _candidato: usersMap[d.data().candidatoId] ?? null,
                    _curso:     cursosMap[d.data().cursoId]     ?? null
                }));

                atualizarResumo();
                renderTabela();
            } catch (err) {
                showAlert('Erro ao carregar dados: ' + err.message, 'error');
                console.error(err);
            }
        }

        function atualizarResumo() {
            const cnt = { pendente: 0, aprovada: 0, concluido: 0, rejeitada: 0 };
            todasInscricoes.forEach(i => { if (cnt[i.status] !== undefined) cnt[i.status]++; });
            document.getElementById('cntTotal').textContent    = todasInscricoes.length;
            document.getElementById('cntPendente').textContent = cnt.pendente;
            document.getElementById('cntAprovada').textContent = cnt.aprovada;
            document.getElementById('cntConcluido').textContent = cnt.concluido;
            document.getElementById('cntRejeitada').textContent = cnt.rejeitada;
        }

        function renderTabela() {
            const busca       = document.getElementById('searchInput').value.toLowerCase();
            const statusFiltro = document.getElementById('statusFilter').value;
            const cursoFiltro  = document.getElementById('cursoFilter').value;

            const filtradas = todasInscricoes.filter(i => {
                const nomeCandidato = i._candidato?.fullName?.toLowerCase() ?? '';
                const nomeCurso     = i._curso?.titulo?.toLowerCase() ?? '';
                const buscaOk  = !busca  || nomeCandidato.includes(busca) || nomeCurso.includes(busca);
                const statusOk = !statusFiltro || i.status === statusFiltro;
                const cursoOk  = !cursoFiltro  || i.cursoId === cursoFiltro;
                return buscaOk && statusOk && cursoOk;
            });

            const tbody = document.getElementById('inscricoesList');

            if (filtradas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:2rem">Nenhuma inscrição encontrada</td></tr>';
                return;
            }

            tbody.innerHTML = filtradas.map(i => {
                const data = i.createdAt?.toDate
                    ? i.createdAt.toDate().toLocaleDateString('pt-BR')
                    : '—';

                const acoes = gerarBotoesAcao(i);

                return `
                    <tr>
                        <td>
                            <strong>${i._candidato?.fullName ?? '—'}</strong>
                            <div style="font-size:11px;color:var(--text-secondary)">${i._candidato?.email ?? ''}</div>
                        </td>
                        <td>${i._candidato?.empresa ?? '—'}</td>
                        <td>${i._curso?.titulo ?? '—'}</td>
                        <td>${i._curso?.instrutor ?? '—'}</td>
                        <td style="white-space:nowrap">${data}</td>
                        <td><span class="status-badge status-${i.status}">${labelStatus(i.status)}</span></td>
                        <td><div class="actions">${acoes}</div></td>
                    </tr>`;
            }).join('');

            // Bind ações
            tbody.querySelectorAll('[data-acao]').forEach(btn => {
                btn.addEventListener('click', () =>
                    alterarStatus(btn.dataset.id, btn.dataset.acao)
                );
            });
        }

        function gerarBotoesAcao(i) {
            if (i.status === 'pendente') return `
                <button class="btn-action btn-aprovar"  data-id="${i.id}" data-acao="aprovada">Aprovar</button>
                <button class="btn-action btn-rejeitar" data-id="${i.id}" data-acao="rejeitada">Rejeitar</button>`;

            if (i.status === 'aprovada') return `
                <button class="btn-action btn-concluir" data-id="${i.id}" data-acao="concluido">Concluir</button>
                <button class="btn-action btn-rejeitar" data-id="${i.id}" data-acao="rejeitada">Cancelar</button>`;

            if (i.status === 'rejeitada') return `
                <button class="btn-action btn-reativar" data-id="${i.id}" data-acao="pendente">Reativar</button>`;

            return '<span style="color:var(--text-secondary);font-size:12px">—</span>';
        }

        function labelStatus(s) {
            return { pendente: 'Pendente', aprovada: 'Aprovada', concluido: 'Concluída', rejeitada: 'Rejeitada' }[s] ?? s;
        }

        async function alterarStatus(inscricaoId, novoStatus) {
            try {
                await updateDoc(doc(db, 'inscricoes', inscricaoId), {
                    status: novoStatus,
                    updatedAt: serverTimestamp()
                });

                // Atualiza estado local
                const insc = todasInscricoes.find(i => i.id === inscricaoId);
                if (insc) insc.status = novoStatus;

                atualizarResumo();
                renderTabela();

                const msgs = {
                    aprovada:  'Inscrição aprovada com sucesso!',
                    rejeitada: 'Inscrição rejeitada.',
                    concluido: 'Inscrição marcada como concluída.',
                    pendente:  'Inscrição reativada.'
                };
                showAlert(msgs[novoStatus] ?? 'Status atualizado.', 'success');
            } catch (err) {
                showAlert('Erro ao atualizar: ' + err.message, 'error');
                console.error(err);
            }
        }

        function showAlert(msg, type) {
            const el = document.getElementById(type === 'success' ? 'alertSuccess' : 'alertError');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }
    </script>
</body>
