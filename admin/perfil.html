<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .profile-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .profile-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            position: sticky;
            top: calc(60px + 2rem);
        }

        .avatar-circle {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: var(--amber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: var(--bg);
            margin: 0 auto 1.25rem auto;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 0.25rem 0;
        }

        .profile-email {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0 0 1rem 0;
            word-break: break-all;
        }

        .profile-role {
            display: inline-block;
            padding: 0.3rem 0.9rem;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(168,85,247,0.14);
            color: #a855f7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .form-card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-card-header h2 {
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .form-card-body { padding: 1.5rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full { grid-column: 1 / -1; }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .hint {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .form-card-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .msg-success, .msg-error {
            font-size: 13px;
            font-weight: 600;
            display: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .msg-success { background: rgba(34,197,94,0.1); color: #22c55e; }
        .msg-error   { background: rgba(239,68,68,0.1); color: #ef4444; }

        .btn-save {
            padding: 0.75rem 2rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-save:hover    { background: var(--amber-dark); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        @media (max-width: 900px) {
            .profile-layout { grid-template-columns: 1fr; }
            .profile-card   { position: static; }
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full { grid-column: auto; }
        }
    </style>
</head>
<body>

                    <polyline points="9 22 9 12 15 12 15 22"></polyline>

            </a>
            <a href="usuarios.html" class="nav-item">

                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>

            <a href="cursos.html" class="nav-item">

                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>

                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>

                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Perfil</h1>
    </div>

    <main class="main">
        <div class="content">
            <div class="profile-layout">

                <div class="profile-card">
                    <div class="avatar-circle" id="avatarCircle">?</div>
                    <p class="profile-name" id="profileName">Carregando...</p>
                    <p class="profile-email" id="profileEmail"></p>
                    <span class="profile-role">Administrador</span>
                </div>

                <div class="form-card">
                    <div class="form-card-header">
                        <h2>Editar Informações</h2>
                    </div>
                    <div class="form-card-body">
                        <div class="form-grid">
                            <div class="form-group full">
                                <label for="fullName">Nome Completo *</label>
                                <input type="text" id="fullName" placeholder="Seu nome completo">
                            </div>

                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" disabled>
                                <span class="hint">O email não pode ser alterado</span>
                            </div>

                            <div class="form-group">
                                <label for="phone">Telefone</label>
                                <input type="tel" id="phone" placeholder="(11) 99999-9999">
                            </div>
                        </div>
                    </div>
                    <div class="form-card-footer">
                        <div>
                            <div class="msg-success" id="msgSuccess">Perfil atualizado com sucesso!</div>
                            <div class="msg-error" id="msgError"></div>
                        </div>
                        <button class="btn-save" id="btnSave">Salvar Alterações</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script type="module">
        import { handleLogout, checkAuth } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { formatPhone, removePhoneFormat, applyMask } from '../assets/js/utils.js';
        import { db } from '../firebase-config.js';
        import {
            collection, getDocs, query, where, doc, updateDoc
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        document.getElementById('phone').addEventListener('input', (e) => {
            applyMask(e.target, formatPhone);
        });

        let userDocId = null;

        checkAuth().then(async user => {
            if (!user) { window.location.href = '../login.html'; return; }
            loadPerfil(user.uid);
        });

        async function loadPerfil(uid) {
            try {
                const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', uid)));
                if (snap.empty) return;

                userDocId = snap.docs[0].id;
                const u   = snap.docs[0].data();

                if (u.role !== 'admin') {
                    window.location.href = '../login.html';
                    return;
                }

                const inicial = (u.fullName || u.email || '?')[0].toUpperCase();
                document.getElementById('avatarCircle').textContent = inicial;
                document.getElementById('profileName').textContent  = u.fullName || 'Sem nome';
                document.getElementById('profileEmail').textContent = u.email || '';

                document.getElementById('fullName').value = u.fullName || '';
                document.getElementById('email').value    = u.email    || '';
                document.getElementById('phone').value    = formatPhone(u.phone || '');
            } catch (err) {
                console.error('Erro ao carregar perfil:', err);
            }
        }

        document.getElementById('btnSave').addEventListener('click', async () => {
            if (!userDocId) return;

            const fullName = document.getElementById('fullName').value.trim();
            if (!fullName) { showError('O nome completo é obrigatório'); return; }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const rawPhone = removePhoneFormat(document.getElementById('phone').value);
                if (rawPhone && rawPhone.length < 10) {
                    showError('Telefone inválido');
                    return;
                }

                await updateDoc(doc(db, 'users', userDocId), {
                    fullName,
                    phone: rawPhone,
                    updatedAt: new Date()
                });

                document.getElementById('profileName').textContent  = fullName;
                document.getElementById('avatarCircle').textContent = fullName[0].toUpperCase();
                showSuccess();
            } catch (err) {
                showError('Erro ao salvar: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar Alterações';
            }
        });

        function showSuccess() {
            const el = document.getElementById('msgSuccess');
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(msg) {
            const el = document.getElementById('msgError');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 4000);
        }
    </script>
</body>
