<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condecorados - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-header h1 { color: var(--text); font-size: 24px; margin: 0; }

        .btn-add {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.6rem 1.1rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-add:hover { background: var(--amber-dark); }

        .table-container {
            background: var(--bg2);
            border-radius: 12px;
            overflow-x: auto;
            overflow-y: auto;
            max-height: calc(100vh - 220px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .table-container thead th {
            position: sticky;
            top: 0;
            background: var(--bg2);
            z-index: 1;
        }

        .foto-thumb {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }
        .foto-placeholder {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(245,158,11,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .actions { display: flex; gap: 0.5rem; }
        .btn-edit, .btn-delete {
            padding: 0.35rem 0.75rem;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-edit   { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .btn-edit:hover   { background: rgba(59,130,246,0.3); }
        .btn-delete { background: rgba(239,68,68,0.15);  color: #ef4444; }
        .btn-delete:hover { background: rgba(239,68,68,0.3); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--bg2);
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-header h2 { color: var(--text); font-size: 18px; margin: 0; }
        .btn-close { background: none; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; line-height: 1; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-cancel, .btn-save {
            padding: 0.65rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-save   { background: var(--amber); color: var(--bg); }

        .foto-preview {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            overflow: hidden;
            margin-top: 0.5rem;
        }
        .foto-preview img { width: 100%; height: 100%; object-fit: cover; }

        .upload-label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1rem;
            border: 1px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: border-color 0.2s, color 0.2s;
            background: var(--bg);
        }
        .upload-label:hover { border-color: var(--amber); color: var(--amber); }
        .upload-label input[type="file"] { display: none; }

        .upload-progress {
            display: none;
            height: 4px;
            background: var(--bg3);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
        }
        .upload-progress-bar {
            height: 100%;
            background: var(--amber);
            border-radius: 2px;
            width: 0%;
            transition: width 0.2s;
        }

        .foto-filename {
            font-size: 11px;
            color: var(--text-secondary);
            margin: 0.3rem 0 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .flash {
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 1rem;
            display: none;
        }
        .flash-ok  { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.3);  color: #22c55e; }
        .flash-err { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #ef4444; }

        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="../assets/img/t35logo.png" alt="T35 Academy" class="logo">
            <h2>T35 Academy</h2>
        </div>
        <nav class="sidebar-nav">

            <a href="usuarios.html" class="nav-item">

            </a>
            <a href="cursos.html" class="nav-item">

                <span>Cursos</span>
            </a>
            <a href="inscricoes.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
                <span>Inscrições</span>
            </a>
            <a href="empresas.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>

            </a>
            <a href="relatorios.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>

            </a>
            <a href="condecorados.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>

            </a>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">Condecorados</h1>
    </div>

    <main class="main">
        <div class="content">
            <div id="flashOk"  class="flash flash-ok"></div>
            <div id="flashErr" class="flash flash-err"></div>

            <div class="page-header">
                <h1>Gerenciar Condecorados</h1>
                <button class="btn-add" id="btnAdicionar">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Adicionar
                </button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Cargo</th>
                            <th>Empresa</th>
                            <th>Título do Prêmio</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listBody">
                        <tr><td colspan="7" style="text-align:center;color:var(--text-secondary)">Carregando...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Adicionar Condecorado</h2>
                <button class="btn-close" id="btnClose">&times;</button>
            </div>

            <div class="form-group">
                <label>Foto</label>
                <label class="upload-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <span id="uploadLabelText">Escolher foto...</span>
                    <input type="file" id="fFotoFile" accept="image/*">
                </label>
                <p class="foto-filename" id="fotoFilename"></p>
                <div class="upload-progress" id="uploadProgress">
                    <div class="upload-progress-bar" id="uploadProgressBar"></div>
                </div>
                <div class="foto-preview" id="fotoPreview">🏅</div>
            </div>

            <div class="form-row" style="margin-top:1rem">
                <div class="form-group">
                    <label>Nome *</label>
                    <input type="text" id="fNome" placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" id="fCargo" placeholder="Ex: Analista">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Empresa</label>
                    <input type="text" id="fEmpresa" placeholder="Empresa">
                </div>
                <div class="form-group">
                    <label>Data da Condecoração</label>
                    <input type="date" id="fData">
                </div>
            </div>
            <div class="form-group">
                <label>Título do Prêmio *</label>
                <input type="text" id="fTitulo" placeholder="Ex: Destaque do Mês, Inovador do Ano">
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="fDescricao" rows="3" placeholder="Motivo da condecoração, conquistas..." style="resize:vertical"></textarea>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancel">Cancelar</button>
                <button class="btn-save"   id="btnSave">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { auth, db, storage } from '../firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
        import {
            collection, getDocs, addDoc, doc, updateDoc, deleteDoc,
            query, orderBy, where, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';
        import {
            ref, uploadBytesResumable, getDownloadURL, deleteObject
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);
        document.getElementById('btnAdicionar').addEventListener('click', () => abrirModal());
        document.getElementById('btnClose').addEventListener('click', fecharModal);
        document.getElementById('btnCancel').addEventListener('click', fecharModal);
        document.getElementById('btnSave').addEventListener('click', salvar);
        document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) fecharModal(); });

        document.getElementById('fFotoFile').addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('uploadLabelText').textContent = file.name;
            document.getElementById('fotoFilename').textContent = `${(file.size / 1024).toFixed(0)} KB`;
            const reader = new FileReader();
            reader.onload = ev => {
                document.getElementById('fotoPreview').innerHTML = `<img src="${ev.target.result}">`;
            };
            reader.readAsDataURL(file);
        });

        let todos = [];
        let editId = null;
        let editFotoUrl = null;

        function uploadFoto(file) {
            return new Promise((resolve, reject) => {
                const ext = file.name.split('.').pop();
                const path = `condecorados/${Date.now()}.${ext}`;
                const storageRef = ref(storage, path);
                const task = uploadBytesResumable(storageRef, file);
                const progress = document.getElementById('uploadProgress');
                const bar = document.getElementById('uploadProgressBar');
                progress.style.display = 'block';
                task.on('state_changed',
                    snap => { bar.style.width = (snap.bytesTransferred / snap.totalBytes * 100) + '%'; },
                    err  => { progress.style.display = 'none'; reject(err); },
                    async () => {
                        progress.style.display = 'none';
                        bar.style.width = '0%';
                        resolve(await getDownloadURL(task.snapshot.ref));
                    }
                );
            });
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '../login.html'; return; }
            const snap = await getDocs(query(collection(db, 'users'), where('uid', '==', user.uid)));
            if (snap.docs[0]?.data()?.role !== 'admin') { window.location.href = '../login.html'; return; }
            carregar();
        });

        async function carregar() {
            try {
                const snap = await getDocs(query(collection(db, 'condecorados'), orderBy('data', 'desc')));
                todos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar();
            } catch (err) {
                console.error(err);
            }
        }

        function renderizar() {
            const tbody = document.getElementById('listBody');
            if (todos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary);padding:2rem">Nenhum condecorado cadastrado</td></tr>';
                return;
            }
            tbody.innerHTML = todos.map(c => `
                <tr>
                    <td>
                        ${c.foto
                            ? `<img src="${c.foto}" class="foto-thumb" alt="${c.nome}" onerror="this.style.display='none'">`
                            : `<div class="foto-placeholder">🏅</div>`}
                    </td>
                    <td><strong>${c.nome}</strong></td>
                    <td>${c.cargo || '—'}</td>
                    <td>${c.empresa || '—'}</td>
                    <td style="color:var(--amber);font-weight:600">${c.titulo}</td>
                    <td>${c.data ? new Date(c.data).toLocaleDateString('pt-BR') : '—'}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit"   data-id="${c.id}">Editar</button>
                            <button class="btn-delete" data-id="${c.id}">Excluir</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            tbody.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => abrirModal(btn.dataset.id)));
            tbody.querySelectorAll('.btn-delete').forEach(btn =>
                btn.addEventListener('click', () => excluir(btn.dataset.id)));
        }

        function abrirModal(id = null) {
            editId = id;
            editFotoUrl = null;
            document.getElementById('fFotoFile').value = '';
            document.getElementById('uploadLabelText').textContent = 'Escolher foto...';
            document.getElementById('fotoFilename').textContent = '';
            document.getElementById('fotoPreview').innerHTML = '🏅';

            if (id) {
                const c = todos.find(x => x.id === id);
                editFotoUrl = c.foto || null;
                document.getElementById('modalTitle').textContent = 'Editar Condecorado';
                document.getElementById('fNome').value      = c.nome || '';
                document.getElementById('fCargo').value     = c.cargo || '';
                document.getElementById('fEmpresa').value   = c.empresa || '';
                document.getElementById('fTitulo').value    = c.titulo || '';
                document.getElementById('fDescricao').value = c.descricao || '';
                document.getElementById('fData').value      = c.data || '';
                if (c.foto) {
                    document.getElementById('fotoPreview').innerHTML = `<img src="${c.foto}" onerror="this.parentElement.innerHTML='🏅'">`;
                    document.getElementById('uploadLabelText').textContent = 'Trocar foto...';
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Adicionar Condecorado';
                document.getElementById('fNome').value      = '';
                document.getElementById('fCargo').value     = '';
                document.getElementById('fEmpresa').value   = '';
                document.getElementById('fTitulo').value    = '';
                document.getElementById('fDescricao').value = '';
                document.getElementById('fData').value      = '';
            }
            document.getElementById('modal').classList.add('active');
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
            editId = null;
        }

        async function salvar() {
            const nome   = document.getElementById('fNome').value.trim();
            const titulo = document.getElementById('fTitulo').value.trim();
            if (!nome || !titulo) { flash('Preencha Nome e Título do Prêmio.', 'err'); return; }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.textContent = 'Salvando...';

            try {
                const arquivo = document.getElementById('fFotoFile').files[0];
                let fotoUrl = editFotoUrl;
                if (arquivo) {
                    btn.textContent = 'Enviando foto...';
                    fotoUrl = await uploadFoto(arquivo);
                }

                const dados = {
                    nome,
                    cargo:     document.getElementById('fCargo').value.trim(),
                    empresa:   document.getElementById('fEmpresa').value.trim(),
                    titulo,
                    descricao: document.getElementById('fDescricao').value.trim(),
                    data:      document.getElementById('fData').value || null,
                    foto:      fotoUrl || null,
                    updatedAt: serverTimestamp()
                };

                if (editId) {
                    await updateDoc(doc(db, 'condecorados', editId), dados);
                    flash('Condecorado atualizado!', 'ok');
                } else {
                    await addDoc(collection(db, 'condecorados'), { ...dados, createdAt: serverTimestamp() });
                    flash('Condecorado adicionado!', 'ok');
                }

                fecharModal();
                carregar();
            } catch (err) {
                console.error(err);
                flash('Erro ao salvar. Tente novamente.', 'err');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Salvar';
            }
        }

        async function excluir(id) {
            if (!confirm('Excluir este condecorado?')) return;
            try {
                await deleteDoc(doc(db, 'condecorados', id));
                flash('Excluído com sucesso.', 'ok');
                carregar();
            } catch (err) {
                console.error(err);
                flash('Erro ao excluir.', 'err');
            }
        }

        function flash(msg, tipo) {
            const el = document.getElementById(tipo === 'ok' ? 'flashOk' : 'flashErr');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3500);
        }
    </script>
</body>
</html>
