<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: var(--amber);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            background: rgba(245, 158, 11, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon svg { color: var(--amber); }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.35rem;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .sections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .section-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .section-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h2 {
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .section-link {
            font-size: 12px;
            color: var(--amber);
            text-decoration: none;
            font-weight: 600;
        }

        .section-link:hover { text-decoration: underline; }

        .section-body { padding: 0; }

        .list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s ease;
        }

        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: rgba(245, 158, 11, 0.05); }

        .list-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--amber);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: var(--bg);
            flex-shrink: 0;
        }

        .list-info { flex: 1; min-width: 0; }

        .list-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .status-ativo { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-inativo { background: rgba(239,68,68,0.15); color: #ef4444; }
        .status-pendente { background: rgba(245,158,11,0.15); color: var(--amber); }

        .role-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(59,130,246,0.15);
            color: #3b82f6;
            flex-shrink: 0;
        }

        .empty-msg {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .sections-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 380px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        /* Cabeçalho da página */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin: 0;
        }
        .btn-aviso {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.1rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }
        .btn-aviso:hover { background: #d97706; transform: translateY(-1px); }

        /* Modal Aviso */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 { font-size: 16px; font-weight: 700; color: var(--text); margin: 0; }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .modal-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .modal-body label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; display: block; margin-bottom: 0.35rem; }
        .modal-body input,
        .modal-body textarea,
        .modal-body select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .modal-body input:focus,
        .modal-body textarea:focus,
        .modal-body select:focus { outline: none; border-color: var(--amber); }
        .modal-body textarea { resize: vertical; min-height: 90px; }
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        .btn-cancelar {
            padding: 0.65rem 1.25rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cancelar:hover { border-color: var(--amber); color: var(--text); }
        .btn-enviar {
            padding: 0.65rem 1.5rem;
            background: var(--amber);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-enviar:hover { background: #d97706; }
        .btn-enviar:disabled { opacity: 0.6; cursor: not-allowed; }
        .modal-alert {
            padding: 0.65rem 1rem;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .modal-alert.success { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .modal-alert.error   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    </style>
</head>

    <!-- Modal Enviar Aviso -->

    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
        import {
            collection, getDocs, query, where, orderBy, limit,
            addDoc, serverTimestamp
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);

        // ── Modal Aviso ──
        const modalAviso = document.getElementById('modalAviso');
        document.getElementById('btnAbrirAviso').addEventListener('click',  () => modalAviso.classList.add('open'));
        document.getElementById('btnFecharModal').addEventListener('click', () => fecharModal());
        document.getElementById('btnCancelarModal').addEventListener('click', () => fecharModal());
        modalAviso.addEventListener('click', (e) => { if (e.target === modalAviso) fecharModal(); });

        function fecharModal() {
            modalAviso.classList.remove('open');
            document.getElementById('modalAlert').style.display = 'none';
        }

        document.getElementById('btnEnviarAviso').addEventListener('click', async () => {
            const titulo   = document.getElementById('avisoTitulo').value.trim();
            const mensagem = document.getElementById('avisoMensagem').value.trim();
            const tipo     = document.getElementById('avisoTipo').value;
            const alert    = document.getElementById('modalAlert');
            const btn      = document.getElementById('btnEnviarAviso');

            if (!titulo || !mensagem) {
                alert.textContent   = 'Preencha o título e a mensagem.';
                alert.className     = 'modal-alert error';
                alert.style.display = 'block';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Enviando...';
            alert.style.display = 'none';

            try {
                await addDoc(collection(db, 'notificacoes'), {
                    titulo,
                    mensagem,
                    tipo,
                    createdAt: serverTimestamp()
                });

                alert.textContent   = '✓ Aviso enviado com sucesso!';
                alert.className     = 'modal-alert success';
                alert.style.display = 'block';

                document.getElementById('avisoTitulo').value   = '';
                document.getElementById('avisoMensagem').value = '';

                setTimeout(() => fecharModal(), 2000);
            } catch (err) {
                alert.textContent   = 'Erro ao enviar: ' + err.message;
                alert.className     = 'modal-alert error';
                alert.style.display = 'block';
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Enviar Aviso';
            }
        });

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = '../login.html'; return; }

            const q = query(collection(db, 'users'), where('uid', '==', user.uid));
            const snap = await getDocs(q);
            const userData = snap.docs[0]?.data();

            if (userData?.role !== 'admin') {
                alert('Acesso negado!');
                window.location.href = '../login.html';
                return;
            }

            loadStats();
            loadRecentUsers();
            loadRecentCursos();
        });

        async function loadStats() {
            try {
                const [usersSnap, cursosSnap, empresasSnap, inscSnap] = await Promise.all([
                    getDocs(collection(db, 'users')),
                    getDocs(query(collection(db, 'cursos'), where('status', '==', 'ativo'))),
                    getDocs(collection(db, 'empresas')),
                    getDocs(query(collection(db, 'inscricoes'), where('status', '==', 'pendente')))
                ]);

                document.getElementById('totalUsuarios').textContent = usersSnap.size;
                document.getElementById('totalCursos').textContent = cursosSnap.size;
                document.getElementById('totalEmpresas').textContent = empresasSnap.size;
                document.getElementById('totalPendentes').textContent = inscSnap.size;
            } catch (err) {
                console.error('Erro ao carregar stats:', err);
            }
        }

        async function loadRecentUsers() {
            const container = document.getElementById('recentUsers');
            try {
                const snap = await getDocs(query(collection(db, 'users'), orderBy('createdAt', 'desc'), limit(5)));

                if (snap.empty) {
                    container.innerHTML = '<p class="empty-msg">Nenhum usuário cadastrado</p>';
                    return;
                }

                container.innerHTML = snap.docs.map(d => {
                    const u = d.data();
                    const inicial = (u.fullName || u.email || '?')[0].toUpperCase();
                    return `
                        <div class="list-item">
                            <div class="list-avatar">${inicial}</div>
                            <div class="list-info">
                                <div class="list-name">${u.fullName || 'Sem nome'}</div>
                                <div class="list-sub">${u.email}</div>
                            </div>
                            <span class="role-badge">${u.role || 'candidato'}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p class="empty-msg">Erro ao carregar usuários</p>';
            }
        }

        async function loadRecentCursos() {
            const container = document.getElementById('recentCursos');
            try {
                const snap = await getDocs(query(collection(db, 'cursos'), orderBy('createdAt', 'desc'), limit(5)));

                if (snap.empty) {
                    container.innerHTML = '<p class="empty-msg">Nenhum curso cadastrado</p>';
                    return;
                }

                container.innerHTML = snap.docs.map(d => {
                    const c = d.data();
                    return `
                        <div class="list-item">
                            <div class="list-info">
                                <div class="list-name">${c.titulo}</div>
                                <div class="list-sub">👨‍🏫 ${c.instrutor}</div>
                            </div>
                            <span class="status-badge status-${c.status}">${c.status}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = '<p class="empty-msg">Erro ao carregar cursos</p>';
            }
        }
    </script>
</body>
</html>
