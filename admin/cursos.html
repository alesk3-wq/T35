<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos - T35 Academy</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content { padding: 2rem; }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 { color: var(--text); font-size: 28px; margin: 0; }

        .btn-new {
            padding: 0.75rem 1.5rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-new:hover { background: var(--amber-dark); transform: translateY(-2px); }

        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filters input { flex: 1; min-width: 200px; max-width: 360px; }
        .filters select { min-width: 160px; }

        .table-container {
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-ativo { background: rgba(34,197,94,0.15); color: #22c55e; }
        .status-inativo { background: rgba(239,68,68,0.15); color: #ef4444; }
        .status-concluido { background: rgba(148,163,184,0.15); color: var(--text-secondary); }

        .formato-badge {
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(59,130,246,0.15);
            color: #3b82f6;
        }

        .actions { display: flex; gap: 0.6rem; }

        .btn-edit, .btn-toggle, .btn-delete {
            padding: 0.35rem 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit { background: rgba(59,130,246,0.15); color: #3b82f6; }
        .btn-edit:hover { background: rgba(59,130,246,0.3); }

        .btn-toggle { background: rgba(245,158,11,0.15); color: var(--amber); }
        .btn-toggle:hover { background: rgba(245,158,11,0.3); }

        .btn-delete { background: rgba(239,68,68,0.15); color: #ef4444; }
        .btn-delete:hover { background: rgba(239,68,68,0.3); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: flex-start;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--bg2);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 640px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            margin: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 { color: var(--text); font-size: 20px; margin: 0; }

        .btn-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .btn-cancel, .btn-save {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel { background: var(--border); color: var(--text); }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }
        .btn-save { background: var(--amber); color: var(--bg); }
        .btn-save:hover { background: var(--amber-dark); }

        .success-message, .error-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
        }

        .error-message {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        @media (max-width: 768px) {
            .page-header { flex-direction: column; gap: 1rem; align-items: flex-start; }
            .btn-new { width: 100%; }
            .form-row { grid-template-columns: 1fr; }
            table { font-size: 12px; }
            th, td { padding: 0.6rem 0.5rem; }
            .actions { flex-direction: column; }
        }
    </style>
</head>
<body>

        <div class="sidebar-footer">

                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Cursos</h1>
    </div>

    <main class="main">
        <div class="content">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <div class="page-header">
                <h1>Gerenciar Cursos</h1>
                <button class="btn-new" id="btnNovoCurso">+ Novo Curso</button>
            </div>

            <div class="filters">
                <input type="text" id="searchInput" placeholder="Buscar por título ou instrutor...">
                <select id="statusFilter">
                    <option value="">Todos os status</option>
                    <option value="ativo">Ativo</option>
                    <option value="inativo">Inativo</option>
                    <option value="concluido">Concluído</option>
                </select>
                <select id="formatoFilter">
                    <option value="">Todos os formatos</option>
                    <option value="presencial">Presencial</option>
                    <option value="online">Online</option>
                    <option value="hibrido">Híbrido</option>
                </select>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Instrutor</th>
                            <th>Formato</th>
                            <th>Início</th>
                            <th>Fim</th>
                            <th>Vagas</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="cursosList">
                        <tr>
                            <td colspan="8" style="text-align:center;color:var(--text-secondary)">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display:none">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <h3>Nenhum curso cadastrado</h3>
                    <p>Clique em "Novo Curso" para criar o primeiro</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal criar/editar curso -->
    <div class="modal" id="cursoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Novo Curso</h2>
                <button class="btn-close" id="btnCloseModal">&times;</button>
            </div>

            <form id="cursoForm">
                <div class="form-group">
                    <label>Título *</label>
                    <input type="text" id="cursoTitulo" placeholder="Nome do curso" required>
                </div>

                <div class="form-group">
                    <label>Descrição *</label>
                    <textarea id="cursoDescricao" placeholder="Descreva o conteúdo do curso" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Instrutor *</label>
                        <input type="text" id="cursoInstrutor" placeholder="Nome do instrutor" required>
                    </div>
                    <div class="form-group">
                        <label>Formato *</label>
                        <select id="cursoFormato" required>
                            <option value="">Selecione...</option>
                            <option value="presencial">Presencial</option>
                            <option value="online">Online</option>
                            <option value="hibrido">Híbrido</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Local / Link</label>
                    <input type="text" id="cursoLocal" placeholder="Endereço ou link de acesso">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data de Início *</label>
                        <input type="date" id="cursoDataInicio" required>
                    </div>
                    <div class="form-group">
                        <label>Data de Fim *</label>
                        <input type="date" id="cursoDataFim" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Duração</label>
                        <input type="text" id="cursoDuracao" placeholder="Ex: 8 horas, 3 dias">
                    </div>
                    <div class="form-group">
                        <label>Vagas *</label>
                        <input type="number" id="cursoVagas" min="1" placeholder="Ex: 20" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="cursoStatus">
                        <option value="ativo">Ativo</option>
                        <option value="inativo">Inativo</option>
                    </select>
                </div>
            </form>

            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelModal">Cancelar</button>
                <button class="btn-save" id="btnSalvarCurso">Salvar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { auth, db } from '../firebase-config.js';
        import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
        import {
            collection, getDocs, addDoc, doc, updateDoc,
            deleteDoc, serverTimestamp, query, where, orderBy
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        document.getElementById('btnMenu').addEventListener('click', toggleSidebar);
        document.getElementById('btnLogout').addEventListener('click', handleLogout);
        document.getElementById('btnNovoCurso').addEventListener('click', () => openModal(null));
        document.getElementById('btnCloseModal').addEventListener('click', closeModal);
        document.getElementById('btnCancelModal').addEventListener('click', closeModal);
        document.getElementById('btnSalvarCurso').addEventListener('click', salvarCurso);
        document.getElementById('searchInput').addEventListener('input', filtrarCursos);
        document.getElementById('statusFilter').addEventListener('change', filtrarCursos);
        document.getElementById('formatoFilter').addEventListener('change', filtrarCursos);

        let allCursos = [];
        let currentCursoId = null;

        // Verificar autenticação e role admin
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            const q = query(collection(db, 'users'), where('uid', '==', user.uid));
            const snap = await getDocs(q);
            const userData = snap.docs[0]?.data();

            if (userData?.role !== 'admin') {
                alert('Acesso negado! Apenas administradores.');
                window.location.href = '../login.html';
                return;
            }

            loadCursos();
        });

        async function loadCursos() {
            try {
                const snap = await getDocs(query(collection(db, 'cursos'), orderBy('dataInicio', 'asc')));
                allCursos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderCursos(allCursos);
            } catch (err) {
                showError('Erro ao carregar cursos: ' + err.message);
            }
        }

        function formatarData(ts) {
            if (!ts) return '-';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            return d.toLocaleDateString('pt-BR');
        }

        function renderCursos(cursos) {
            const tbody = document.getElementById('cursosList');
            const emptyState = document.getElementById('emptyState');

            if (cursos.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = cursos.map(c => `
                <tr>
                    <td><strong>${c.titulo}</strong></td>
                    <td>${c.instrutor}</td>
                    <td><span class="formato-badge">${c.formato}</span></td>
                    <td>${formatarData(c.dataInicio)}</td>
                    <td>${formatarData(c.dataFim)}</td>
                    <td>${c.vagas ?? '-'}</td>
                    <td><span class="status-badge status-${c.status}">${c.status}</span></td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" data-id="${c.id}">Editar</button>
                            <button class="btn-toggle" data-id="${c.id}" data-status="${c.status}">
                                ${c.status === 'ativo' ? 'Inativar' : 'Ativar'}
                            </button>
                            <button class="btn-delete" data-id="${c.id}">Excluir</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            tbody.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => openModal(btn.dataset.id))
            );
            tbody.querySelectorAll('.btn-toggle').forEach(btn =>
                btn.addEventListener('click', () => toggleStatus(btn.dataset.id, btn.dataset.status))
            );
            tbody.querySelectorAll('.btn-delete').forEach(btn =>
                btn.addEventListener('click', () => excluirCurso(btn.dataset.id))
            );
        }

        function filtrarCursos() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            const formato = document.getElementById('formatoFilter').value;

            const filtered = allCursos.filter(c =>
                (!search || c.titulo?.toLowerCase().includes(search) || c.instrutor?.toLowerCase().includes(search)) &&
                (!status || c.status === status) &&
                (!formato || c.formato === formato)
            );
            renderCursos(filtered);
        }

        function openModal(cursoId) {
            currentCursoId = cursoId;
            const form = document.getElementById('cursoForm');
            form.reset();

            if (cursoId) {
                const curso = allCursos.find(c => c.id === cursoId);
                if (!curso) return;

                document.getElementById('modalTitle').textContent = 'Editar Curso';
                document.getElementById('cursoTitulo').value = curso.titulo || '';
                document.getElementById('cursoDescricao').value = curso.descricao || '';
                document.getElementById('cursoInstrutor').value = curso.instrutor || '';
                document.getElementById('cursoFormato').value = curso.formato || '';
                document.getElementById('cursoLocal').value = curso.local || '';
                document.getElementById('cursoDuracao').value = curso.duracao || '';
                document.getElementById('cursoVagas').value = curso.vagas || '';
                document.getElementById('cursoStatus').value = curso.status || 'ativo';

                // Converte Timestamp para string de data para o input
                if (curso.dataInicio) {
                    const d = curso.dataInicio.toDate ? curso.dataInicio.toDate() : new Date(curso.dataInicio);
                    document.getElementById('cursoDataInicio').value = d.toISOString().split('T')[0];
                }
                if (curso.dataFim) {
                    const d = curso.dataFim.toDate ? curso.dataFim.toDate() : new Date(curso.dataFim);
                    document.getElementById('cursoDataFim').value = d.toISOString().split('T')[0];
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Novo Curso';
                document.getElementById('cursoStatus').value = 'ativo';
            }

            document.getElementById('cursoModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('cursoModal').classList.remove('active');
            currentCursoId = null;
        }

        async function salvarCurso() {
            const titulo = document.getElementById('cursoTitulo').value.trim();
            const descricao = document.getElementById('cursoDescricao').value.trim();
            const instrutor = document.getElementById('cursoInstrutor').value.trim();
            const formato = document.getElementById('cursoFormato').value;
            const local = document.getElementById('cursoLocal').value.trim();
            const dataInicioStr = document.getElementById('cursoDataInicio').value;
            const dataFimStr = document.getElementById('cursoDataFim').value;
            const duracao = document.getElementById('cursoDuracao').value.trim();
            const vagas = parseInt(document.getElementById('cursoVagas').value);
            const status = document.getElementById('cursoStatus').value;

            if (!titulo || !descricao || !instrutor || !formato || !dataInicioStr || !dataFimStr || !vagas) {
                showError('Preencha todos os campos obrigatórios (*).');
                return;
            }

            const dataInicio = new Date(dataInicioStr + 'T00:00:00');
            const dataFim = new Date(dataFimStr + 'T00:00:00');

            if (dataFim < dataInicio) {
                showError('A data de fim não pode ser anterior à data de início.');
                return;
            }

            const payload = {
                titulo,
                descricao,
                instrutor,
                formato,
                local,
                dataInicio,
                dataFim,
                duracao,
                vagas,
                status,
                updatedAt: serverTimestamp()
            };

            try {
                if (currentCursoId) {
                    await updateDoc(doc(db, 'cursos', currentCursoId), payload);
                    showSuccess('Curso atualizado com sucesso!');
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(collection(db, 'cursos'), payload);
                    showSuccess('Curso criado com sucesso!');
                }
                closeModal();
                loadCursos();
            } catch (err) {
                showError('Erro ao salvar curso: ' + err.message);
            }
        }

        async function toggleStatus(cursoId, statusAtual) {
            const novoStatus = statusAtual === 'ativo' ? 'inativo' : 'ativo';
            const acao = novoStatus === 'ativo' ? 'ativar' : 'inativar';
            if (!confirm(`Deseja ${acao} este curso?`)) return;

            try {
                await updateDoc(doc(db, 'cursos', cursoId), {
                    status: novoStatus,
                    updatedAt: serverTimestamp()
                });
                showSuccess(`Curso ${acao === 'ativar' ? 'ativado' : 'inativado'} com sucesso!`);
                loadCursos();
            } catch (err) {
                showError('Erro ao alterar status: ' + err.message);
            }
        }

        async function excluirCurso(cursoId) {
            if (!confirm('Tem certeza que deseja excluir este curso?\nEsta ação não pode ser desfeita.')) return;

            try {
                await deleteDoc(doc(db, 'cursos', cursoId));
                showSuccess('Curso excluído com sucesso!');
                loadCursos();
            } catch (err) {
                showError('Erro ao excluir curso: ' + err.message);
            }
        }

        function showSuccess(msg) {
            const el = document.getElementById('successMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        document.getElementById('cursoModal').addEventListener('click', e => {
            if (e.target === document.getElementById('cursoModal')) closeModal();
        });
    </script>
</body>
</html>
