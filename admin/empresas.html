<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="../assets/img/favi-t35.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresas - T35 Academy Admin</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <style>
        .content {
            padding: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            color: var(--text);
            font-size: 28px;
            margin: 0;
        }

        .btn-new {
            padding: 0.75rem 1.5rem;
            background: var(--amber);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-new:hover {
            background: #f08a00;
            transform: translateY(-2px);
        }

        .table-container {
            background: var(--bg2);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg);
            border-bottom: 2px solid var(--border);
        }

        th {
            padding: 1rem;
            text-align: left;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
        }

        tbody tr:hover {
            background: rgba(245, 158, 11, 0.05);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn-edit,
        .btn-delete {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg2);
            border-radius: 12px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: var(--text);
            font-size: 20px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .btn-cancel,
        .btn-save {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: var(--border);
            color: var(--text);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-save {
            background: var(--amber);
            color: var(--bg);
        }

        .btn-save:hover {
            background: #f08a00;
        }

        .error-message {
            padding: 0.75rem 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            color: #ef4444;
            font-size: 14px;
            margin-bottom: 1rem;
            display: none;
        }

        .success-message {
            padding: 0.75rem 1rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            color: #22c55e;
            font-size: 14px;
            margin-bottom: 1rem;
            display: none;
        }

        @media (max-width: 768px) {
            .page-header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .btn-new {
                width: 100%;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 0.75rem 0.5rem;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- ✅ SIDEBAR (padrão) -->

            <a href="inscricoes.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                    <rect x="9" y="3" width="6" height="4" rx="1"></rect>
                    <line x1="9" y1="12" x2="15" y2="12"></line>

            <a href="empresas.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>

            <a href="relatorios.html" class="nav-item">

        </nav>

        <div class="sidebar-footer">
            <button class="btn-logout" id="btnLogout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- ✅ TOPBAR (padrão) -->
    <div class="topbar">
        <button class="btn-menu" id="btnMenu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1 class="page-title">Empresas</h1>
    </div>

    <!-- ✅ MAIN CONTENT -->
    <main class="main">
        <div class="content">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <div class="page-header">
                <h1>Gerenciar Empresas</h1>
                <button class="btn-new" id="btnNewEmpresa">+ Nova Empresa</button>
            </div>

            <div class="table-container">
                <table id="empresasTable">
                    <thead>
                        <tr>
                            <th>Nome da Empresa</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="empresasTableBody">
                        <!-- Preenchido por JS -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v4"></path>
                    </svg>
                    <h3>Nenhuma empresa cadastrada</h3>
                    <p>Clique em "Nova Empresa" para criar uma</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ✅ MODAL DE EDIÇÃO/CRIAÇÃO -->
    <div class="modal" id="empresaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Nova Empresa</h2>
            </div>

            <form id="empresaForm">
                <div class="form-group">
                    <label for="empresaNome">Nome da Empresa *</label>
                    <input type="text" id="empresaNome" placeholder="Digite o nome da empresa" required>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btnCancel">Cancelar</button>
                    <button type="submit" class="btn-save">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ✅ Scripts com type="module" -->
    <script type="module">
        import { handleLogout } from '../assets/js/auth.js';
        import { toggleSidebar } from '../assets/js/ui-shell.js';
        import { db } from '../firebase-config.js';
        import { 
            collection, 
            addDoc, 
            getDocs, 
            updateDoc, 
            deleteDoc, 
            doc,
            query,
            orderBy
        } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

        const btnMenu = document.getElementById('btnMenu');
        const btnLogout = document.getElementById('btnLogout');
        const btnNewEmpresa = document.getElementById('btnNewEmpresa');
        const btnCancel = document.getElementById('btnCancel');
        const empresaModal = document.getElementById('empresaModal');
        const empresaForm = document.getElementById('empresaForm');
        const empresasTableBody = document.getElementById('empresasTableBody');
        const emptyState = document.getElementById('emptyState');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        let currentEmpresaId = null;

        // ✅ Eventos da UI
        btnMenu.addEventListener('click', toggleSidebar);
        btnLogout.addEventListener('click', handleLogout);
        btnNewEmpresa.addEventListener('click', openModal);
        btnCancel.addEventListener('click', closeModal);
        empresaForm.addEventListener('submit', saveEmpresa);

        // ✅ Carrega empresas ao iniciar
        loadEmpresas();

        /**
         * Carrega todas as empresas do Firestore
         */
        async function loadEmpresas() {
            try {
                const q = query(collection(db, 'empresas'), orderBy('nome', 'asc'));
                const querySnapshot = await getDocs(q);

                empresasTableBody.innerHTML = '';

                if (querySnapshot.empty) {
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';

                querySnapshot.forEach((doc) => {
                    const empresa = doc.data();
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${empresa.nome}</td>
                        <td>
                            <div class="actions">
                                <button type="button" class="btn-edit" data-id="${doc.id}" data-nome="${empresa.nome}">Editar</button>
                                <button type="button" class="btn-delete" data-id="${doc.id}">Deletar</button>
                            </div>
                        </td>
                    `;

                    // ✅ Event listeners para os botões
                    row.querySelector('.btn-edit').addEventListener('click', () => {
                        editEmpresa(doc.id, empresa.nome);
                    });

                    row.querySelector('.btn-delete').addEventListener('click', () => {
                        deleteEmpresa(doc.id);
                    });

                    empresasTableBody.appendChild(row);
                });
            } catch (error) {
                console.error('Erro ao carregar empresas:', error);
                showError('Erro ao carregar empresas');
            }
        }

        /**
         * Abre o modal para nova empresa
         */
        function openModal() {
            currentEmpresaId = null;
            document.getElementById('modalTitle').textContent = 'Nova Empresa';
            document.getElementById('empresaNome').value = '';
            empresaModal.classList.add('active');
        }

        /**
         * Edita uma empresa
         */
        function editEmpresa(id, nome) {
            currentEmpresaId = id;
            document.getElementById('modalTitle').textContent = 'Editar Empresa';
            document.getElementById('empresaNome').value = nome;
            empresaModal.classList.add('active');
        }

        /**
         * Fecha o modal
         */
        function closeModal() {
            empresaModal.classList.remove('active');
            currentEmpresaId = null;
        }

        /**
         * Salva ou atualiza empresa
         */
        async function saveEmpresa(e) {
            e.preventDefault();

            const nome = document.getElementById('empresaNome').value.trim();

            if (!nome) {
                showError('Digite o nome da empresa');
                return;
            }

            try {
                if (currentEmpresaId) {
                    // ✅ Atualiza empresa existente
                    await updateDoc(doc(db, 'empresas', currentEmpresaId), {
                        nome,
                        updatedAt: new Date()
                    });
                    showSuccess('Empresa atualizada com sucesso!');
                } else {
                    // ✅ Cria nova empresa
                    await addDoc(collection(db, 'empresas'), {
                        nome,
                        createdAt: new Date(),
                        updatedAt: new Date()
                    });
                    showSuccess('Empresa criada com sucesso!');
                }

                closeModal();
                loadEmpresas();
            } catch (error) {
                console.error('Erro ao salvar empresa:', error);
                showError('Erro ao salvar empresa: ' + error.message);
            }
        }

        /**
         * Deleta uma empresa
         */
        async function deleteEmpresa(id) {
            if (!confirm('Tem certeza que deseja deletar esta empresa?')) return;

            try {
                await deleteDoc(doc(db, 'empresas', id));
                showSuccess('Empresa deletada com sucesso!');
                loadEmpresas();
            } catch (error) {
                console.error('Erro ao deletar empresa:', error);
                showError('Erro ao deletar empresa: ' + error.message);
            }
        }

        /**
         * Mostra mensagem de sucesso
         */
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
            setTimeout(() => {
                successMessage.style.display = 'none';
            }, 3000);
        }

        /**
         * Mostra mensagem de erro
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 5000);
        }

        // Fecha modal ao clicar fora
        empresaModal.addEventListener('click', (e) => {
            if (e.target === empresaModal) closeModal();
        });
    </script>
</body>
</html>
